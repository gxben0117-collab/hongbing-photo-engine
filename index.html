<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紅兵寫真旅拍引擎 v4.2｜咒語產生器</title>
<style>
  :root{
    --cream:#F8F1E7;
    --paper:#FFFCF7;
    --ink:#3B2A21;
    --ink-soft:#8C7A6B;
    --terracotta:#C97B5A;
    --terracotta-deep:#A8593D;
    --line:#E6D5C3;
    --gold:#BB9457;
    --selected:#F3E2D3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:60px;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 20px 40px;
  }
  header{
    text-align:center;
    margin-bottom:28px;
  }
  header .eyebrow{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    letter-spacing:0.25em;
    color:var(--terracotta-deep);
    text-transform:uppercase;
  }
  header h1{
    font-family:"Noto Serif TC",serif;
    font-size:26px;
    font-weight:700;
    margin:6px 0 4px;
  }
  header p{
    font-size:13px;
    color:var(--ink-soft);
    margin:0;
  }
  .note{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:28px;
  }
  section{
    margin-bottom:30px;
  }
  .step{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:12px;
  }
  .step .num{
    font-family:"Noto Serif TC",serif;
    font-size:28px;
    font-weight:700;
    color:var(--terracotta);
    line-height:1;
  }
  .step .title{
    font-size:16px;
    font-weight:700;
  }
  .step .sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-left:auto;
  }
  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
  }
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }
  .card .name{
    font-weight:700;
    font-size:14px;
    margin-bottom:2px;
  }
  .card .desc{
    font-size:12px;
    color:var(--ink-soft);
  }
  .card.selected{
    border-color:var(--terracotta);
    background:var(--selected);
  }
  .card.selected .name{
    color:var(--terracotta-deep);
  }
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:999px;
    padding:8px 16px;
    font-size:13px;
    cursor:pointer;
    transition:border-color .15s, background .15s, color .15s;
  }
  .chip input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }
  .chip.selected{
    border-color:var(--gold);
    background:var(--selected);
    color:var(--terracotta-deep);
    font-weight:700;
  }
  .theme-input{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    padding:14px;
    font-size:16px;
    color:var(--ink);
    font-family:inherit;
  }
  .theme-input::placeholder{
    color:#C7B6A6;
  }
  .generate-btn{
    width:100%;
    background:var(--terracotta);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.05em;
    cursor:pointer;
    font-family:"Noto Serif TC",serif;
    transition:background .15s;
  }
  .generate-btn:active{
    background:var(--terracotta-deep);
  }
  .output-wrap{
    margin-top:24px;
  }
  .output-wrap textarea{
    width:100%;
    min-height:280px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:16px;
    font-size:13px;
    line-height:1.7;
    color:var(--ink);
    font-family:"Noto Sans TC",monospace;
    resize:vertical;
    white-space:pre-wrap;
  }
  .copy-btn{
    margin-top:10px;
    width:100%;
    background:var(--paper);
    border:1px solid var(--terracotta);
    color:var(--terracotta-deep);
    border-radius:12px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:background .15s;
  }
  .copy-btn.copied{
    background:var(--terracotta);
    color:#fff;
    border-color:var(--terracotta);
  }
  .hidden{
    display:none;
  }
</style>
</head>
<body>

// ====== 互動邏輯:單選卡片 ======
function setupRadioCards(containerId){
  const container = document.getElementById(containerId);
  const cards = container.querySelectorAll('.card');
  cards.forEach(card=>{
    card.addEventListener('click', ()=>{
      cards.forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      card.querySelector('input').checked = true;
    });
  });
}

// ====== 互動邏輯:主題快選 chips ======
const themeChips = document.querySelectorAll('#themeChips .chip');
const themeInputEl = document.getElementById('themeInput');

themeChips.forEach(chip=>{
  chip.addEventListener('click', ()=>{
    themeChips.forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    chip.querySelector('input').checked = true;
    themeInputEl.value = chip.dataset.value;
  });
});

themeInputEl.addEventListener('input', ()=>{
  const matching = Array.from(themeChips).find(c => c.dataset.value === themeInputEl.value);
  themeChips.forEach(c=>{
    c.classList.toggle('selected', c === matching);
    if(c !== matching){ c.querySelector('input').checked = false; }
  });
});

  const style = STYLES[styleKey];
  const ratioKey = document.querySelector('input[name="ratio"]:checked').value;

  // 服裝邏輯模組(動態)

// ====== 複製咒語 ======
document.getElementById('copyBtn').addEventListener('click', ()=>{
  const text = document.getElementById('outputText').value;
  const copyBtn = document.getElementById('copyBtn');

  function showCopied(){
    copyBtn.textContent = '已複製!';
    copyBtn.classList.add('copied');
    setTimeout(()=>{
      copyBtn.textContent = '複製咒語';
      copyBtn.classList.remove('copied');
    }, 1500);
  }

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showCopied).catch(()=>{
      fallbackCopy(text, showCopied);
    });
  } else {
    fallbackCopy(text, showCopied);
  }
});

function fallbackCopy(text, cb){
  const ta = document.getElementById('outputText');
  ta.focus();
  ta.select();
  try{ document.execCommand('copy'); cb(); }catch(e){}
}
</script>
