<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 咒語產生器｜寫真引擎</title>
<style>
  :root{
    --black:#0A0A0A;
    --charcoal:#141414;
    --line:#2A2A2A;
    --paper:#F7F4EF;
    --soft:#999;
    --gold:#C9A84C;
    --white:#FFFFFF;
    --terra:#C9A84C;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--black);
    color:var(--paper);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    min-height:100vh;
  }

  /* ── NAV ── */
  nav{
    position:fixed;
    top:0;left:0;right:0;
    background:rgba(10,10,10,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:100;
    padding:0 24px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    color:var(--gold);
    letter-spacing:0.08em;
    text-decoration:none;
  }
  .nav-links{
    display:flex;
    gap:6px;
  }
  .nav-link{
    font-size:12px;
    color:var(--soft);
    text-decoration:none;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .15s;
    letter-spacing:0.03em;
  }
  .nav-link:hover{
    color:var(--paper);
    border-color:var(--line);
  }
  .nav-link.active{
    color:var(--gold);
    border-color:var(--gold);
    background:rgba(201,168,76,0.08);
  }

  /* ── HERO ── */
  .hero{
    padding:140px 24px 80px;
    text-align:center;
    max-width:700px;
    margin:0 auto;
  }
  .hero-eyebrow{
    font-size:11px;
    letter-spacing:0.4em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:20px;
  }
  .hero h1{
    font-family:"Noto Serif TC",serif;
    font-size:clamp(28px,6vw,48px);
    font-weight:900;
    line-height:1.2;
    color:var(--white);
    margin-bottom:16px;
    letter-spacing:0.02em;
  }
  .hero h1 span{
    color:var(--gold);
  }
  .hero p{
    font-size:15px;
    color:var(--soft);
    line-height:1.8;
    max-width:480px;
    margin:0 auto 48px;
  }

  /* ── CARDS ── */
  .tools{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:16px;
    max-width:700px;
    margin:0 auto;
    padding:0 24px 80px;
  }
  .tool-card{
    display:block;
    text-decoration:none;
    border:1px solid var(--line);
    border-radius:16px;
    padding:32px 28px;
    background:var(--charcoal);
    transition:border-color .2s, transform .2s, background .2s;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .tool-card::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:2px;
    opacity:0;
    transition:opacity .2s;
  }
  .tool-card.travel::before{ background:var(--terra); }
  .tool-card.studio::before{ background:var(--gold); }
  .tool-card.doll::before{ background:var(--gold); }
  .tool-card.fantasy::before{ background:#B889FF; }
  .tool-card.store::before{ background:#70D6C8; }
  .tool-card:hover{
    border-color:#3A3A3A;
    transform:translateY(-3px);
    background:#1A1A1A;
  }
  .tool-card:hover::before{ opacity:1; }

  .tool-tag{
    display:inline-block;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:20px;
    font-weight:700;
  }
  .tool-card.travel .tool-tag{
    background:rgba(201,168,76,0.12);
    color:var(--gold);
    border:1px solid rgba(201,168,76,0.3);
  }
  .tool-card.studio .tool-tag{
    background:rgba(201,168,76,0.12);
    color:var(--gold);
    border:1px solid rgba(201,168,76,0.3);
  }
  .tool-card.doll .tool-tag{
    background:rgba(201,168,76,0.12);
    color:var(--gold);
    border:1px solid rgba(201,168,76,0.3);
  }
  .tool-card.fantasy .tool-tag{
    background:rgba(184,137,255,0.12);
    color:#D9C3FF;
    border:1px solid rgba(184,137,255,0.3);
  }
  .tool-card.store .tool-tag{
    background:rgba(112,214,200,0.12);
    color:#A4EFE4;
    border:1px solid rgba(112,214,200,0.3);
  }
  .tool-card h2{
    font-family:"Noto Serif TC",serif;
    font-size:20px;
    font-weight:900;
    color:var(--white);
    margin-bottom:10px;
    line-height:1.3;
  }
  .tool-card p{
    font-size:13px;
    color:var(--soft);
    line-height:1.7;
    margin-bottom:24px;
  }
  .tool-features{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:28px;
  }
  .tool-feature{
    font-size:11px;
    color:#666;
    background:#1E1E1E;
    border:1px solid var(--line);
    border-radius:4px;
    padding:3px 8px;
  }
  .tool-cta{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.05em;
  }
  .tool-card.travel .tool-cta{ color:var(--gold); }
  .tool-card.studio .tool-cta{ color:var(--gold); }
  .tool-card.doll .tool-cta{ color:var(--gold); }
  .tool-card.fantasy .tool-cta{ color:#D9C3FF; }
  .tool-card.store .tool-cta{ color:#A4EFE4; }
  .tool-cta-arrow{
    font-size:16px;
    transition:transform .2s;
  }
  .tool-card:hover .tool-cta-arrow{ transform:translateX(4px); }

  /* ── FOOTER ── */
  footer{
    text-align:center;
    padding:24px;
    font-size:12px;
    color:#444;
    border-top:1px solid var(--line);
  }
</style>
</head>

</nav>

  <h1>AI 出圖<span>咒語產生器</span></h1>

  <a class="tool-card doll" href="doll.html">

  <a class="tool-card fantasy" href="fantasy-fashion.html">

  <a class="tool-card store" href="store-ad.html">
