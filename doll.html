<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公仔萌工作室｜藍寶 Editorial Engine</title>
<style>
  :root{
    --bg:#FFF5F9;
    --paper:#FFFFFF;
    --pink:#F06292;
    --pink-deep:#C2185B;
    --pink-soft:#FCE4EC;
    --lavender:#CE93D8;
    --mint:#80CBC4;
    --line:#F8BBD0;
    --ink:#3D1A24;
    --ink-soft:#9E6B7A;
    --selected:#FCE4EC;
    --gold:#F9A825;
    --black:#0A0A0A;
    --nav-bg:rgba(255,245,249,0.92);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:60px;
  }

  /* ── NAV ── */
  nav{
    position:fixed;
    top:0;left:0;right:0;
    background:var(--nav-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:100;
    padding:0 24px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    color:var(--pink-deep);
    letter-spacing:0.08em;
    text-decoration:none;
  }
  .nav-links{ display:flex; gap:6px; }
  .nav-link{
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:none;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .15s;
  }
  .nav-link:hover{ color:var(--ink); border-color:var(--line); }
  .nav-link.active{
    color:var(--pink-deep);
    border-color:var(--pink);
    background:var(--pink-soft);
  }

  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:80px 20px 40px;
  }

  /* ── HEADER ── */
  header{
    text-align:center;
    margin-bottom:28px;
  }
  .header-eyebrow{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--pink);
    margin-bottom:10px;
  }
  header h1{
    font-family:"Noto Serif TC",serif;
    font-size:26px;
    font-weight:900;
    color:var(--ink);
    margin-bottom:6px;
  }
  header h1 span{ color:var(--pink-deep); }
  header p{ font-size:13px; color:var(--ink-soft); }

  .note{
    background:var(--paper);
    border:1px solid var(--line);
    border-left:3px solid var(--pink);
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:28px;
  }

  /* ── SECTION ── */
  section{ margin-bottom:28px; }
  .step{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:12px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .step .num{
    font-family:"Noto Serif TC",serif;
    font-size:22px;
    font-weight:700;
    color:var(--pink);
    line-height:1;
  }
  .step .title{ font-size:15px; font-weight:700; color:var(--ink); }
  .step .sub{ font-size:12px; color:var(--ink-soft); margin-left:auto; }

  /* ── CARDS ── */
  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .cards-4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:11px 12px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card input{ position:absolute; opacity:0; pointer-events:none; }
  .card .name{ font-weight:700; font-size:13px; color:var(--ink); margin-bottom:2px; }
  .card .desc{ font-size:11px; color:var(--ink-soft); line-height:1.4; }
  .card.selected{ border-color:var(--pink); background:var(--selected); }
  .card.selected .name{ color:var(--pink-deep); }

  /* ── CHIPS ── */
  .chips{ display:flex; flex-wrap:wrap; gap:7px; }
  .chip{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:999px;
    padding:7px 14px;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    transition:all .15s;
  }
  .chip input{ position:absolute; opacity:0; pointer-events:none; }
  .chip.selected{
    border-color:var(--pink);
    background:var(--pink-soft);
    color:var(--pink-deep);
    font-weight:700;
  }

  /* ── AUTO TOGGLE ── */
  .auto-card{
    position:relative;
    border:2px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:10px 14px;
    cursor:pointer;
    transition:all .15s;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .auto-card input{ position:absolute; opacity:0; pointer-events:none; }
  .auto-card.selected{
    border-color:var(--lavender);
    background:#F3E5F5;
    color:#7B1FA2;
  }

  /* ── TEXT INPUT ── */
  .text-input{
    width:100%;
    border:1.5px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:14px 16px;
    font-size:15px;
    color:var(--ink);
    font-family:inherit;
  }
  .text-input::placeholder{ color:#D4A0B0; }
  .text-input:focus{ outline:none; border-color:var(--pink); }

  /* ── ALL AUTO BTN ── */
  .auto-all-btn{
    width:100%;
    background:var(--paper);
    border:1.5px dashed var(--lavender);
    color:#7B1FA2;
    border-radius:12px;
    padding:11px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:20px;
    transition:background .15s;
  }
  .auto-all-btn:hover{ background:#F3E5F5; }

  /* ── ADVANCED TOGGLE ── */
  .advanced-toggle{
    text-align:center;
    margin-bottom:16px;
  }
  .advanced-btn{
    background:none;
    border:none;
    color:var(--pink);
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.03em;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--paper);
  }
  .advanced-section{ display:none; }
  .advanced-section.open{ display:block; }

  /* ── GENERATE ── */
  .generate-btn{
    width:100%;
    background:linear-gradient(135deg, var(--pink), var(--pink-deep));
    color:#fff;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:16px;
    font-weight:900;
    letter-spacing:0.05em;
    cursor:pointer;
    font-family:"Noto Serif TC",serif;
    transition:opacity .15s;
    box-shadow:0 4px 16px rgba(240,98,146,0.3);
  }
  .generate-btn:active{ opacity:0.85; }

  /* ── OUTPUT ── */
  .output-wrap{ margin-top:24px; }
  .output-wrap textarea{
    width:100%;
    min-height:260px;
    border:1.5px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:16px;
    font-size:12px;
    line-height:1.8;
    color:var(--ink);
    font-family:monospace;
    resize:vertical;
  }
  .copy-btn{
    margin-top:8px;
    width:100%;
    background:var(--paper);
    border:1.5px solid var(--pink);
    color:var(--pink-deep);
    border-radius:12px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:all .15s;
  }
  .copy-btn.copied{ background:var(--pink); color:#fff; }
  .hidden{ display:none; }
</style>
</head>

// ====== UI互動 ======
function setupRadioCards(id){
  const c=document.getElementById(id);
  if(!c)return;
  c.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      c.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));
      card.classList.add('selected');
      card.querySelector('input').checked=true;
    });
  });
}
setupRadioCards('styleCards');
setupRadioCards('compositionCards');
setupRadioCards('ratioCards');

// 主題快選
const themeChips=document.querySelectorAll('#themeChips .chip');
const themeInputEl=document.getElementById('themeInput');
themeChips.forEach(chip=>{
  chip.addEventListener('click',()=>{
    themeChips.forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    themeInputEl.value=chip.dataset.value;
  });
});
themeInputEl.addEventListener('input',()=>{
  const m=Array.from(themeChips).find(c=>c.dataset.value===themeInputEl.value);
  themeChips.forEach(c=>c.classList.toggle('selected',c===m));
});

// 進階選項auto+chip互斥邏輯
function setupAutoGroup(autoCardId, chipsContainerId, radioName){
  const autoCard=document.getElementById(autoCardId);
  const chips=document.querySelectorAll(`#${chipsContainerId} .chip`);
  autoCard.addEventListener('click',()=>{
    autoCard.classList.add('selected');
    autoCard.querySelector('input').checked=true;
    chips.forEach(c=>c.classList.remove('selected'));
  });
  chips.forEach(chip=>{
    chip.addEventListener('click',()=>{
      chip.classList.toggle('selected');
      const anySelected=Array.from(chips).some(c=>c.classList.contains('selected'));
      if(anySelected){
        autoCard.classList.remove('selected');
        autoCard.querySelector('input').checked=false;
      } else {
        autoCard.classList.add('selected');
        autoCard.querySelector('input').checked=true;
      }
    });
  });
}
setupAutoGroup('hairAutoCard','hairChips','hair');
setupAutoGroup('faceAutoCard','faceChips','face');
setupAutoGroup('poseAutoCard','poseChips','pose');
setupAutoGroup('baseAutoCard','baseChips','base');

服裝 — 符合主題世界觀,可愛Q版風格

  ];

// 複製
document.getElementById('copyBtn').addEventListener('click',()=>{
  const text=document.getElementById('outputText').value;
  const btn=document.getElementById('copyBtn');
  function ok(){ btn.textContent='已複製!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='複製咒語'; btn.classList.remove('copied'); },1500); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok).catch(()=>{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }); }
  else{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }
});
