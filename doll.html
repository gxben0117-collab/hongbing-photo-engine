<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公仔萌工作室｜寫真引擎</title>
<style>
  :root{
    --bg:#0A0A0A;
    --paper:#1A1A1A;
    --pink:#C9A84C;
    --pink-deep:#E8D5A3;
    --pink-soft:#1E1A14;
    --lavender:#E8D5A3;
    --mint:#C9A84C;
    --line:#2E2E2E;
    --ink:#F7F4EF;
    --ink-soft:#999999;
    --selected:#1E1A14;
    --gold:#C9A84C;
    --black:#0A0A0A;
    --white:#FFFFFF;
    --nav-bg:rgba(10,10,10,0.92);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }

  /* ── NAV ── */
  nav{
    position:fixed;
    top:0;left:0;right:0;
    background:var(--nav-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:100;
    padding:0 24px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    color:var(--pink-deep);
    letter-spacing:0.08em;
    text-decoration:none;
  }
  .nav-links{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  .nav-link{
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:none;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .15s;
  }
  .nav-link:hover{ color:var(--ink); border-color:var(--line); }
  .nav-link.active{
    color:var(--pink-deep);
    border-color:var(--pink);
    background:var(--pink-soft);
  }

  .wrap{
    max-width:660px;
    margin:0 auto;
    padding:70px 20px 40px;
  }

  /* ── HEADER ── */
  header{
    padding:48px 0 36px;
    border-bottom:1px solid var(--line);
    margin-bottom:36px;
  }
  .header-eyebrow{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--pink);
    margin-bottom:14px;
  }
  header h1{
    font-family:"Noto Serif TC",serif;
    font-size:32px;
    font-weight:900;
    color:var(--ink);
    margin-bottom:10px;
  }
  header h1 span{ color:var(--pink-deep); }
  header p{ font-size:13px; color:var(--ink-soft); }

  .note{
    background:var(--paper);
    border:1px solid var(--line);
    border-left:3px solid var(--pink);
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:36px;
  }

  /* ── SECTION ── */
  section{ margin-bottom:36px; }
  .step{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .step .num{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.15em;
    color:var(--pink);
    line-height:1;
  }
  .step .title{ font-size:16px; font-weight:700; color:var(--ink); }
  .step .sub{ font-size:12px; color:var(--ink-soft); margin-left:auto; }

  /* ── CARDS ── */
  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .cards-4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card input{ position:absolute; opacity:0; pointer-events:none; }
  .card .name{ font-weight:700; font-size:13px; color:var(--ink); margin-bottom:2px; }
  .card .desc{ font-size:11px; color:var(--ink-soft); line-height:1.4; }
  .card.selected{ border-color:var(--pink); background:var(--selected); }
  .card.selected .name{ color:var(--pink-deep); }

  /* ── CHIPS ── */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:999px;
    padding:7px 16px;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    transition:all .15s;
  }
  .chip input{ position:absolute; opacity:0; pointer-events:none; }
  .chip.selected{
    border-color:var(--pink);
    background:var(--pink-soft);
    color:var(--pink-deep);
    font-weight:700;
  }

  /* ── AUTO TOGGLE ── */
  .auto-card{
    position:relative;
    border:2px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    transition:all .15s;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:14px;
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .auto-card input{ position:absolute; opacity:0; pointer-events:none; }
  .auto-card.selected{
    border-color:var(--gold);
    background:var(--selected);
    color:var(--gold);
  }

  /* ── TEXT INPUT ── */
  .text-input{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:14px 16px;
    font-size:15px;
    color:var(--ink);
    font-family:inherit;
  }
  .text-input::placeholder{ color:#666666; }
  .text-input:focus{ outline:none; border-color:var(--pink); }

  /* ── ALL AUTO BTN ── */
  .auto-all-btn{
    width:100%;
    background:var(--paper);
    border:1px dashed var(--gold);
    color:var(--gold);
    border-radius:8px;
    padding:11px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:20px;
    transition:background .15s;
  }
  .auto-all-btn:hover{ background:var(--selected); }

  /* ── ADVANCED TOGGLE ── */
  .advanced-toggle{
    text-align:center;
    margin-bottom:16px;
  }
  .advanced-btn{
    background:none;
    border:none;
    color:var(--pink);
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.03em;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--paper);
  }
  .advanced-section{ display:none; }
  .advanced-section.open{ display:block; }

  /* ── GENERATE ── */
  .generate-btn{
    width:100%;
    background:var(--gold);
    color:var(--black);
    border:none;
    border-radius:8px;
    padding:16px;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.05em;
    cursor:pointer;
    font-family:"Noto Serif TC",serif;
    transition:opacity .15s;
  }
  .generate-btn:active{ opacity:0.85; }

  /* ── OUTPUT ── */
  .output-wrap{ margin-top:24px; }
  .output-wrap textarea{
    width:100%;
    min-height:300px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:16px;
    font-size:12px;
    line-height:1.8;
    color:var(--ink);
    font-family:monospace;
    resize:vertical;
  }
  .copy-btn{
    margin-top:8px;
    width:100%;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    border-radius:8px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }
  .copy-btn.copied{ background:var(--gold); color:var(--black); }
  .hidden{ display:none; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">寫真引擎</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="travel.html">寫真旅拍</a>
    <a class="nav-link" href="magazine.html">雜誌棚拍</a>
    <a class="nav-link active" href="doll.html">公仔系列</a>
    <a class="nav-link" href="fantasy-fashion.html">幻想廣告</a>
    <a class="nav-link" href="store-ad.html">店家廣告</a>
  </div>
</nav>

<div class="wrap">

  <header>
    <div class="header-eyebrow">第三輯 · 公仔萌工作室</div>
    <h1>公仔萌<span>工作室</span></h1>
    <p>真人→可愛公仔｜主題服裝 × 布景 × 情景自動生成</p>
  </header>

  <div class="note">
    💡 上傳真人照片後使用此咒語——系統會將本人轉化為可愛公仔風格,同時保留臉部辨識度。
  </div>

  <!-- 01 主題靈感 -->
  <section>
    <div class="step">
      <div class="num">01</div>
      <div class="title">主題靈感</div>
      <div class="sub">輸入或點選快選</div>
    </div>
    <div class="chips" id="themeChips">
      <label class="chip" data-value="貓咪女僕">🐱 貓咪女僕</label>
      <label class="chip" data-value="萬聖節魔女">🎃 萬聖節魔女</label>
      <label class="chip" data-value="草莓甜心">🍓 草莓甜心</label>
      <label class="chip" data-value="太空探險">🚀 太空探險</label>
      <label class="chip" data-value="海洋人魚">🧜 海洋人魚</label>
      <label class="chip" data-value="森林精靈">🌿 森林精靈</label>
      <label class="chip" data-value="賽博龐克">⚡ 賽博龐克</label>
      <label class="chip" data-value="聖誕節">🎄 聖誕節</label>
      <label class="chip" data-value="春日櫻花">🌸 春日櫻花</label>
      <label class="chip" data-value="甜點魔法">🍰 甜點魔法</label>
      <label class="chip" data-value="中式仙俠">⚔️ 中式仙俠</label>
      <label class="chip" data-value="龍年新春">🐲 龍年新春</label>
    </div>
    <input type="text" class="text-input" id="themeInput" placeholder="輸入任意靈感,例如:草莓、萬聖節、未來忍者…" style="margin-top:10px;">
  </section>

  <!-- 02 風格強度 -->
  <section>
    <div class="step">
      <div class="num">02</div>
      <div class="title">風格強度</div>
      <div class="sub">單選,決定整體氣質</div>
    </div>
    <div class="cards" id="styleCards">
      <label class="card selected" data-value="sweet">
        <input type="radio" name="style" value="sweet" checked>
        <div class="name">🍬 甜美萌系</div>
        <div class="desc">圓潤可愛,粉嫩色調</div>
      </label>
      <label class="card" data-value="cool">
        <input type="radio" name="style" value="cool">
        <div class="name">🖤 酷帥暗黑</div>
        <div class="desc">個性冷酷,深色質感</div>
      </label>
      <label class="card" data-value="fairy">
        <input type="radio" name="style" value="fairy">
        <div class="name">🌙 清新童話</div>
        <div class="desc">夢幻輕柔,自然色系</div>
      </label>
      <label class="card" data-value="cyber">
        <input type="radio" name="style" value="cyber">
        <div class="name">⚡ 賽博未來</div>
        <div class="desc">霓虹發光,科技感強</div>
      </label>
          <label class="card" data-value="blindbox"><input type="radio" name="style" value="blindbox"><div class="name">盲盒公仔</div><div class="desc">潮玩盲盒,可愛收藏</div></label>
      <label class="card" data-value="nendoroid"><input type="radio" name="style" value="nendoroid"><div class="name">黏土人比例</div><div class="desc">大頭小身,日系可動感</div></label>
      <label class="card" data-value="plush"><input type="radio" name="style" value="plush"><div class="name">毛絨玩偶</div><div class="desc">柔軟布料,抱抱玩偶感</div></label>
      <label class="card" data-value="sofubi"><input type="radio" name="style" value="sofubi"><div class="name">搪膠玩具</div><div class="desc">復古搪膠,潮玩質感</div></label>
      <label class="card" data-value="resin_collectible"><input type="radio" name="style" value="resin_collectible"><div class="name">樹脂收藏公仔</div><div class="desc">精緻雕塑,高級收藏</div></label>
      <label class="card" data-value="chibi_anime"><input type="radio" name="style" value="chibi_anime"><div class="name">Q版動漫模型</div><div class="desc">動漫Q版,角色模型感</div></label>
      <label class="card" data-value="premium_showcase"><input type="radio" name="style" value="premium_showcase"><div class="name">精品展示模型</div><div class="desc">展示櫃級,高級商品感</div></label></div>
  </section>

  <!-- 03 構圖模式 -->
  <section>
    <div class="step">
      <div class="num">03</div>
      <div class="title">構圖模式</div>
      <div class="sub">單選</div>
    </div>
    <div class="cards" id="compositionCards">
      <label class="card selected" data-value="single">
        <input type="radio" name="composition" value="single" checked>
        <div class="name">單人展示</div>
        <div class="desc">標準公仔展示構圖</div>
      </label>
      <label class="card" data-value="float">
        <input type="radio" name="composition" value="float">
        <div class="name">浮空構圖</div>
        <div class="desc">角色漂浮,裙擺飄起</div>
      </label>
      <label class="card" data-value="capsule">
        <input type="radio" name="composition" value="capsule">
        <div class="name">膠囊包裝</div>
        <div class="desc">模擬商品包裝外觀</div>
      </label>
          <label class="card" data-value="clear_box"><input type="radio" name="composition" value="clear_box"><div class="name">透明盒展示</div><div class="desc">透明外盒,商品收藏感</div></label>
      <label class="card" data-value="turntable"><input type="radio" name="composition" value="turntable"><div class="name">轉盤商品照</div><div class="desc">旋轉展示台,電商商品感</div></label>
      <label class="card" data-value="blindbox_unbox"><input type="radio" name="composition" value="blindbox_unbox"><div class="name">盲盒開箱構圖</div><div class="desc">盒子與公仔同框,開箱瞬間</div></label>
      <label class="card" data-value="desktop_collect"><input type="radio" name="composition" value="desktop_collect"><div class="name">桌面收藏構圖</div><div class="desc">桌面展示,收藏日常感</div></label>
      <label class="card" data-value="front_display"><input type="radio" name="composition" value="front_display"><div class="name">正面站姿展示</div><div class="desc">正面完整展示,商品照清楚</div></label>
      <label class="card" data-value="mini_scene"><input type="radio" name="composition" value="mini_scene"><div class="name">微縮場景展示</div><div class="desc">迷你場景,主題世界觀</div></label>
      <label class="card" data-value="accessory_ring"><input type="radio" name="composition" value="accessory_ring"><div class="name">配件環繞構圖</div><div class="desc">配件圍繞,豪華套組感</div></label></div>
  </section>

  <!-- 04 圖片比例 -->
  <section>
    <div class="step">
      <div class="num">04</div>
      <div class="title">圖片比例</div>
      <div class="sub">單選</div>
    </div>
    <div class="cards-4" id="ratioCards">
      <label class="card selected" data-value="9:16">
        <input type="radio" name="ratio" value="9:16" checked>
        <div class="name">9:16</div>
        <div class="desc">手機桌布</div>
      </label>
      <label class="card" data-value="1:1">
        <input type="radio" name="ratio" value="1:1">
        <div class="name">1:1</div>
        <div class="desc">正方形</div>
      </label>
      <label class="card" data-value="3:4">
        <input type="radio" name="ratio" value="3:4">
        <div class="name">3:4</div>
        <div class="desc">直式人像</div>
      </label>
      <label class="card" data-value="4:3">
        <input type="radio" name="ratio" value="4:3">
        <div class="name">4:3</div>
        <div class="desc">橫式展示</div>
      </label>
          <label class="card" data-value="2:3"><input type="radio" name="ratio" value="2:3"><div class="name">2:3</div><div class="desc">商品海報</div></label>
      <label class="card" data-value="4:5"><input type="radio" name="ratio" value="4:5"><div class="name">4:5</div><div class="desc">電商展示</div></label></div>
  </section>
  <!-- 05 輸出風格 -->
  <section>
    <div class="step">
      <div class="num">05</div>
      <div class="title">輸出風格 / 材質媒材</div>
      <div class="sub">單選，決定公仔質感</div>
    </div>
    <div class="cards-4" id="mediaCards">
      <label class="card selected" data-value="3d_figure">
        <input type="radio" name="media" value="3d_figure" checked>
        <div class="name">3D 公仔</div>
        <div class="desc">PVC / 收藏展示</div>
      </label>
      <label class="card" data-value="clay">
        <input type="radio" name="media" value="clay">
        <div class="name">黏土風</div>
        <div class="desc">手作 / 圓潤霧面</div>
      </label>
      <label class="card" data-value="toy_photo">
        <input type="radio" name="media" value="toy_photo">
        <div class="name">玩具攝影</div>
        <div class="desc">實拍感 / 桌面景深</div>
      </label>
      <label class="card" data-value="anime_model">
        <input type="radio" name="media" value="anime_model">
        <div class="name">動漫模型風</div>
        <div class="desc">日系手辦 / 動漫臉</div>
      </label>
    </div>
  </section>
  <!-- 進階選項 -->
  <div class="advanced-toggle">
    <button class="advanced-btn" id="advancedBtn">✦ 展開進階選項(髮型/表情/姿勢/底座)</button>
  </div>

  <div class="advanced-section" id="advancedSection">

    <!-- A 髮型 -->
    <section>
      <div class="step">
        <div class="num">A</div>
        <div class="title">髮型</div>
        <div class="sub">單選,可選自動</div>
      </div>
      <label class="auto-card selected" id="hairAutoCard" data-value="auto">
        <input type="radio" name="hair" value="auto" checked>✦ 自動
      </label>
      <div class="chips" id="hairChips">
        <label class="chip" data-value="雙馬尾">雙馬尾</label>
        <label class="chip" data-value="波浪長髮">波浪長髮</label>
        <label class="chip" data-value="短捲髮">短捲髮</label>
        <label class="chip" data-value="中分長髮">中分長髮</label>
        <label class="chip" data-value="丸子頭">丸子頭</label>
        <label class="chip" data-value="雙髮環">雙髮環</label>
        <label class="chip" data-value="側綁辮子">側綁辮子</label>
        <label class="chip" data-value="蓬鬆短髮">蓬鬆短髮</label>
      </div>
    </section>

    <!-- B 表情 -->
    <section>
      <div class="step">
        <div class="num">B</div>
        <div class="title">表情</div>
        <div class="sub">單選,可選自動</div>
      </div>
      <label class="auto-card selected" id="faceAutoCard" data-value="auto">
        <input type="radio" name="face" value="auto" checked>✦ 自動
      </label>
      <div class="chips" id="faceChips">
        <label class="chip" data-value="微笑">微笑</label>
        <label class="chip" data-value="開心大笑">開心大笑</label>
        <label class="chip" data-value="呆萌">呆萌</label>
        <label class="chip" data-value="壞笑">壞笑</label>
        <label class="chip" data-value="驚訝閃眼">驚訝閃眼</label>
        <label class="chip" data-value="害羞紅臉">害羞紅臉</label>
      </div>
    </section>

    <!-- C 姿勢 -->
    <section>
      <div class="step">
        <div class="num">C</div>
        <div class="title">姿勢</div>
        <div class="sub">單選,可選自動</div>
      </div>
      <label class="auto-card selected" id="poseAutoCard" data-value="auto">
        <input type="radio" name="pose" value="auto" checked>✦ 自動
      </label>
      <div class="chips" id="poseChips">

function setupRadioCards(id){
  const c=document.getElementById(id);
  if(!c)return;
  c.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      c.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));
      card.classList.add('selected');
      card.querySelector('input').checked=true;
    });
  });
}

setupRadioCards('compositionCards');
setupRadioCards('ratioCards');
setupRadioCards('mediaCards');

function setRadioCardValue(containerId, value){
  const container = document.getElementById(containerId);
  if(!container) return;
  container.querySelectorAll('.card').forEach(card=>{
    const input = card.querySelector('input');
    const selected = card.dataset.value === value;
    card.classList.toggle('selected', selected);
    if(input) input.checked = selected;
  });
}

function applyDollStyleDefaults(styleValue){
  const preset = DOLL_STYLE_PRESET_DEFAULTS[styleValue];
  if(!preset) return;
  if(preset.composition) setRadioCardValue('compositionCards', preset.composition);
  if(preset.media) setRadioCardValue('mediaCards', preset.media);
  if(preset.ratio) setRadioCardValue('ratioCards', preset.ratio);
}

    chip.classList.add('selected');

  });
});
themeInputEl.addEventListener('input',()=>{
  const m=Array.from(themeChips).find(c=>c.dataset.value===themeInputEl.value);
  themeChips.forEach(c=>c.classList.toggle('selected',c===m));
});

function setupAutoGroup(autoCardId, chipsContainerId, radioName){
  const autoCard=document.getElementById(autoCardId);
  const chips=document.querySelectorAll(`#${chipsContainerId} .chip`);
  autoCard.addEventListener('click',()=>{
    autoCard.classList.add('selected');
    autoCard.querySelector('input').checked=true;
    chips.forEach(c=>c.classList.remove('selected'));
  });
  chips.forEach(chip=>{
    chip.addEventListener('click',()=>{
      chip.classList.toggle('selected');
      const anySelected=Array.from(chips).some(c=>c.classList.contains('selected'));
      if(anySelected){
        autoCard.classList.remove('selected');
        autoCard.querySelector('input').checked=false;
      } else {
        autoCard.classList.add('selected');
        autoCard.querySelector('input').checked=true;
      }
    });
  });
}
