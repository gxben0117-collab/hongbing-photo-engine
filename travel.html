<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寫真旅拍風格咒語產生器｜藍寶 Editorial Engine</title>
<style>
  :root{
    --cream:#F8F1E7;
    --paper:#FFFCF7;
    --ink:#3B2A21;
    --ink-soft:#8C7A6B;
    --terracotta:#C97B5A;
    --terracotta-deep:#A8593D;
    --line:#E6D5C3;
    --gold:#BB9457;
    --selected:#F3E2D3;
    --black:#0A0A0A;
    --nav-line:#2A2A2A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:60px;
  }

  /* ── NAV ── */
  nav{
    position:fixed;
    top:0;left:0;right:0;
    background:rgba(248,241,231,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:100;
    padding:0 24px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    color:var(--terracotta-deep);
    letter-spacing:0.08em;
    text-decoration:none;
  }
  .nav-links{
    display:flex;
    gap:6px;
  }
  .nav-link{
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:none;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .15s;
  }
  .nav-link:hover{
    color:var(--ink);
    border-color:var(--line);
  }
  .nav-link.active{
    color:var(--terracotta-deep);
    border-color:var(--terracotta);
    background:rgba(201,123,90,0.08);
  }

  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:80px 20px 40px;
  }
  header{
    text-align:center;
    margin-bottom:28px;
  }
  header .eyebrow{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    letter-spacing:0.25em;
    color:var(--terracotta-deep);
    text-transform:uppercase;
  }
  header h1{
    font-family:"Noto Serif TC",serif;
    font-size:24px;
    font-weight:700;
    margin:6px 0 4px;
  }
  header p{
    font-size:13px;
    color:var(--ink-soft);
  }
  .note{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:28px;
  }
  section{ margin-bottom:30px; }
  .step{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:12px;
  }
  .step .num{
    font-family:"Noto Serif TC",serif;
    font-size:28px;
    font-weight:700;
    color:var(--terracotta);
    line-height:1;
  }
  .step .title{ font-size:16px; font-weight:700; }
  .step .sub{ font-size:12px; color:var(--ink-soft); margin-left:auto; }

  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .cards-5{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
  }
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card input{ position:absolute; opacity:0; pointer-events:none; }
  .card .name{ font-weight:700; font-size:14px; margin-bottom:2px; }
  .card .desc{ font-size:12px; color:var(--ink-soft); }
  .card.selected{ border-color:var(--terracotta); background:var(--selected); }
  .card.selected .name{ color:var(--terracotta-deep); }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:999px;
    padding:8px 16px;
    font-size:13px;
    cursor:pointer;
    transition:border-color .15s, background .15s, color .15s;
    position:relative;
  }
  .chip input{ position:absolute; opacity:0; pointer-events:none; }
  .chip.selected{
    border-color:var(--gold);
    background:var(--selected);
    color:var(--terracotta-deep);
    font-weight:700;
  }

  .theme-input{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    padding:14px;
    font-size:16px;
    color:var(--ink);
    font-family:inherit;
    margin-top:10px;
  }
  .theme-input::placeholder{ color:#C7B6A6; }

  .generate-btn{
    width:100%;
    background:var(--terracotta);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.05em;
    cursor:pointer;
    font-family:"Noto Serif TC",serif;
    transition:background .15s;
  }
  .generate-btn:active{ background:var(--terracotta-deep); }

  .output-wrap{ margin-top:24px; }
  .output-wrap textarea{
    width:100%;
    min-height:280px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:12px;
    padding:16px;
    font-size:13px;
    line-height:1.7;
    color:var(--ink);
    font-family:monospace;
    resize:vertical;
  }
  .copy-btn{
    margin-top:10px;
    width:100%;
    background:var(--paper);
    border:1px solid var(--terracotta);
    color:var(--terracotta-deep);
    border-radius:12px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:background .15s;
  }
  .copy-btn.copied{ background:var(--terracotta); color:#fff; border-color:var(--terracotta); }
  .hidden{ display:none; }
</style>
</head>

<nav>
  <a class="nav-logo" href="index.html">藍寶 Editorial Engine</a>
  <div class="nav-links">

    <a class="nav-link active" href="travel.html">寫真旅拍</a>

<div class="wrap">

      <label class="card" data-value="luxury">

  <!-- 03 主題 -->

function setupRadioCards(id){
  const c=document.getElementById(id);
  if(!c)return;
  c.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      c.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));
      card.classList.add('selected');
      card.querySelector('input').checked=true;
    });
  });
}
setupRadioCards('compositionCards');

const themeChips=document.querySelectorAll('#themeChips .chip');
const themeInputEl=document.getElementById('themeInput');
themeChips.forEach(chip=>{
  chip.addEventListener('click',()=>{
    themeChips.forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    chip.querySelector('input').checked=true;
    themeInputEl.value=chip.dataset.value;
  });
});
themeInputEl.addEventListener('input',()=>{
  const m=Array.from(themeChips).find(c=>c.dataset.value===themeInputEl.value);
  themeChips.forEach(c=>c.classList.toggle('selected',c===m));
});

document.getElementById('generateBtn').addEventListener('click',()=>{
  const composition=document.querySelector('input[name="composition"]:checked').value;
  const styleKey=document.querySelector('input[name="style"]:checked').value;
  const ratioKey=document.querySelector('input[name="ratio"]:checked').value;
  const cameraKey=document.querySelector('input[name="camera"]:checked').value;
  const style=STYLES[styleKey];
  let theme=themeInputEl.value.trim();
  if(!theme)theme="(請填寫主題)";

  const styleBlock=`【風格模組｜主風格】\n\n${style.text}\n\n${STYLE_SCOPE_NOTE}`;
  const cameraBlock=CAMERA_ANGLES[cameraKey];
  const costumeBlock=`【服裝邏輯模組｜動態造型系統】\n\n根據主題「${theme}」自動設計服裝層次(Layer1~Layer7)\n服裝層數依主題自動增減,通常2~5層,特殊主題可擴展至7層\n優先真人旅拍感\n優先${style.label}的視覺語言\n服裝符合主題世界觀與材質質感\nPremium Fabric / Fine Embroidery / Rich Material Detail\n\n避免過度Cosplay化\n避免遊戲角色盔甲化\n避免動漫角色化`;
  const themeBlock=`【主題】\n\n${theme}`;
  const ratioBlock=`【輸出比例】\n\n${RATIOS[ratioKey]}`;

  const sections=[
    CORE.identity,
    CORE.skeleton,
    CORE.pose,
    CORE.photographer,
    CORE.motion,
    ...(cameraBlock?[cameraBlock]:[]),
    COMPOSITION[composition],
    styleBlock,
    themeBlock,
    costumeBlock,
    CORE.lighting,
    CORE.cleanframe,
    CORE.output,
    ratioBlock
  ];

  document.getElementById('outputText').value=sections.join('\n\n⸻\n\n');
  document.getElementById('outputWrap').classList.remove('hidden');
  document.getElementById('outputWrap').scrollIntoView({behavior:'smooth',block:'start'});
  const cb=document.getElementById('copyBtn');
  cb.textContent='複製咒語';
  cb.classList.remove('copied');
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  const text=document.getElementById('outputText').value;
  const btn=document.getElementById('copyBtn');
  function ok(){ btn.textContent='已複製!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='複製咒語'; btn.classList.remove('copied'); },1500); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok).catch(()=>{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }); }
  else{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }
});
