function setupRadioCards(id){
  const c=document.getElementById(id);
  if(!c)return;
  c.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      c.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));
      card.classList.add('selected');
      card.querySelector('input').checked=true;
    });
  });
}
setupRadioCards('compositionCards');
setupRadioCards('styleCards');
setupRadioCards('ratioCards');
setupRadioCards('cameraCards');
setupRadioCards('lightingCards');
setupRadioCards('motionCards');
setupRadioCards('mediaCards');

function setRadioCardValue(containerId, value){
  const container = document.getElementById(containerId);
  if(!container) return;
  container.querySelectorAll('.card').forEach(card=>{
    const input = card.querySelector('input');
    const selected = card.dataset.value === value;
    card.classList.toggle('selected', selected);
    if(input) input.checked = selected;
  });
}

function getRandomItem(values){
  return values[Math.floor(Math.random() * values.length)];
}

function getCardValues(containerId){
  return Array.from(document.querySelectorAll('#' + containerId + ' .card'))
    .map(card=>card.dataset.value)
    .filter(Boolean);
}

function applyTravelRandomSelection(){
  const compositionValue = getRandomItem(getCardValues('compositionCards'));
  const styleValue = getRandomItem(getCardValues('styleCards').filter(value => value !== 'vogue'));
  const ratioValue = getRandomItem(getCardValues('ratioCards'));
  const cameraValue = getRandomItem(getCardValues('cameraCards'));
  const lightingValue = getRandomItem(getCardValues('lightingCards'));
  const motionValue = getRandomItem(getCardValues('motionCards'));
  const mediaValue = getRandomItem(getCardValues('mediaCards'));
  const themeValue = getRandomItem(Array.from(document.querySelectorAll('#themeChips .chip')).map(chip => chip.dataset.value));

  setRadioCardValue('compositionCards', compositionValue);
  setRadioCardValue('styleCards', styleValue);
  setRadioCardValue('ratioCards', ratioValue);
  setRadioCardValue('cameraCards', cameraValue);
  setRadioCardValue('lightingCards', lightingValue);
  setRadioCardValue('motionCards', motionValue);
  setRadioCardValue('mediaCards', mediaValue);

  themeInputEl.value = themeValue;
  themeInputEl.dispatchEvent(new Event('input', { bubbles: true }));
  document.getElementById('generateBtn').click();
}


const TRAVEL_STYLE_PRESET_DEFAULTS = {
  japanese_clear: { camera: 'soft_focus', motion: 'breeze', media: 'cinematic_realistic' },
  retro_film_travel: { camera: 'handheld_doc', motion: 'flow', media: 'retro_film' },
  resort_hotel: { camera: 'tele_compression', motion: 'breeze', media: 'travel_magazine' },

  vintage: { camera: 'handheld_doc', motion: 'breeze', media: 'retro_film' },
  luxury: { camera: 'cover', motion: 'breeze', media: 'travel_magazine' },
  ethereal: { camera: 'soft_focus', motion: 'breeze', media: 'postcard_illustration' }
};

function applyTravelStyleDefaults(styleValue){
  const preset = TRAVEL_STYLE_PRESET_DEFAULTS[styleValue];
  if(!preset) return;
  if(preset.camera) setRadioCardValue('cameraCards', preset.camera);
  if(preset.motion) setRadioCardValue('motionCards', preset.motion);
  if(preset.media) setRadioCardValue('mediaCards', preset.media);
}

document.querySelectorAll('#styleCards .card').forEach(card=>{
  card.addEventListener('click',()=>{
    applyTravelStyleDefaults(card.dataset.value);
  });
});
const themeChips=document.querySelectorAll('#themeChips .chip');
const themeInputEl=document.getElementById('themeInput');
themeChips.forEach(chip=>{
  chip.addEventListener('click',()=>{
    themeChips.forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    chip.querySelector('input').checked=true;
    themeInputEl.value=chip.dataset.value;
  });
});
themeInputEl.addEventListener('input',()=>{
  const m=Array.from(themeChips).find(c=>c.dataset.value===themeInputEl.value);
  themeChips.forEach(c=>c.classList.toggle('selected',c===m));
});

document.getElementById('generateBtn').addEventListener('click',()=>{
  const composition=document.querySelector('input[name="composition"]:checked').value;
  const styleKey=document.querySelector('input[name="style"]:checked').value;
  const ratioKey=document.querySelector('input[name="ratio"]:checked').value;
  const cameraKey=document.querySelector('input[name="camera"]:checked').value;
  const lightingKey=document.querySelector('input[name="lighting"]:checked').value;
  const motionKey=document.querySelector('input[name="motion"]:checked').value;
  const mediaKey=document.querySelector('input[name="media"]:checked').value;
  const style=STYLES[styleKey];
  let theme=themeInputEl.value.trim();
  if(!theme)theme="(請填寫主題)";

  const styleBlock=`【風格模組｜主風格】\n\n${style.text}\n\n${STYLE_SCOPE_NOTE}`;
  const cameraBlock=CAMERA_ANGLES[cameraKey];
  const lightingBlock=TRAVEL_LIGHTING_STYLES[lightingKey];
  const motionBlock=MOTION_LEVELS[motionKey];
  const mediaBlock=MEDIA_STYLES[mediaKey];
  const costumeBlock=`【服裝邏輯模組｜動態造型系統】\n\n根據主題「${theme}」自動設計服裝層次(Layer1~Layer7)\n服裝層數依主題自動增減,通常2~5層,特殊主題可擴展至7層\n優先真人旅拍感\n優先${style.label}的視覺語言\n服裝符合主題世界觀與材質質感\nPremium Fabric / Fine Embroidery / Rich Material Detail\n\n避免過度Cosplay化\n避免遊戲角色盔甲化\n避免動漫角色化`;
  const themeBlock=`【主題】\n\n${theme}`;
  const ratioBlock=`【輸出比例】\n\n${RATIOS[ratioKey]}`;

  const sections=[
    CORE.identity,
    CORE.skeleton,
    CORE.lighting,
    CORE.pose,
    CORE.photographer,
    ...(lightingBlock?[lightingBlock]:[]),
    ...(cameraBlock?[cameraBlock]:[]),
    ...(motionBlock?[motionBlock]:[]),
    COMPOSITION[composition],
    styleBlock,
    mediaBlock,
    themeBlock,
    costumeBlock,
    CORE.cleanframe,
    CORE.output,
    ratioBlock
  ];

  document.getElementById('outputText').value=sections.join('\n\n⸻\n\n');
  document.getElementById('outputWrap').classList.remove('hidden');
  document.getElementById('outputWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
  const cb=document.getElementById('copyBtn');
  cb.textContent='一鍵複製';
  cb.classList.remove('copied');
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  const text=document.getElementById('outputText').value;
  const btn=document.getElementById('copyBtn');
  function ok(){ btn.textContent='已複製!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='一鍵複製'; btn.classList.remove('copied'); },1500); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok).catch(()=>{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }); }
  else{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }
});

document.getElementById('travelMoodPreset').addEventListener('click',()=>{
  applyTravelRandomSelection();
});
</script>
