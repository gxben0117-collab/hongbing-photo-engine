<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寫真旅拍風格咒語產生器｜藍寶寫真引擎</title>
<style>
  :root{
    --cream:#F8F1E7;
    --paper:#FFFCF7;
    --ink:#3B2A21;
    --ink-soft:#8C7A6B;
    --terracotta:#C97B5A;
    --terracotta-deep:#A8593D;
    --line:#E6D5C3;
    --gold:#BB9457;
    --selected:#F3E2D3;
    --black:#0A0A0A;
    --nav-line:#2A2A2A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }

  /* ── NAV ── */
  nav{
    position:fixed;
    top:0;left:0;right:0;
    background:rgba(248,241,231,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:100;
    padding:0 24px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    color:var(--terracotta-deep);
    letter-spacing:0.08em;
    text-decoration:none;
  }
  .nav-links{
    display:flex;
    gap:6px;
  }
  .nav-link{
    font-size:12px;
    color:var(--ink-soft);
    text-decoration:none;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .15s;
  }
  .nav-link:hover{
    color:var(--ink);
    border-color:var(--line);
  }
  .nav-link.active{
    color:var(--terracotta-deep);
    border-color:var(--terracotta);
    background:rgba(201,123,90,0.08);
  }

  .wrap{
    max-width:660px;
    margin:0 auto;
    padding:70px 20px 40px;
  }
  header{
    padding:48px 0 36px;
    border-bottom:1px solid var(--line);
    margin-bottom:36px;
  }
  header .eyebrow{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--terracotta-deep);
    margin-bottom:14px;
  }
  header h1{
    font-family:"Noto Serif TC",serif;
    font-size:32px;
    font-weight:900;
    letter-spacing:0.02em;
    line-height:1.2;
    margin-bottom:10px;
  }
  header p{
    font-size:13px;
    color:var(--ink-soft);
  }
  .note{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:36px;
  }
  section{ margin-bottom:36px; }
  .step{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .step .num{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.15em;
    color:var(--terracotta);
    line-height:1;
  }
  .step .title{ font-size:16px; font-weight:700; }
  .step .sub{ font-size:12px; color:var(--ink-soft); margin-left:auto; }
  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .cards-5{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card input{ position:absolute; opacity:0; pointer-events:none; }
  .card .name{ font-weight:700; font-size:13px; margin-bottom:3px; }
  .card .desc{ font-size:11px; color:var(--ink-soft); line-height:1.4; }
  .card.selected{ border-color:var(--terracotta); background:var(--selected); }
  .card.selected .name{ color:var(--terracotta-deep); }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:999px;
    padding:7px 16px;
    font-size:13px;
    cursor:pointer;
    transition:border-color .15s, background .15s, color .15s;
    position:relative;
  }
  .chip input{ position:absolute; opacity:0; pointer-events:none; }
  .chip.selected{
    border-color:var(--gold);
    background:var(--selected);
    color:var(--terracotta-deep);
    font-weight:700;
  }

  .theme-input{
    width:100%;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:14px;
    font-size:15px;
    color:var(--ink);
    font-family:inherit;
    margin-top:10px;
  }
  .theme-input::placeholder{ color:#C7B6A6; }

  .generate-btn{
    width:100%;
    background:var(--terracotta);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:16px;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.05em;
    cursor:pointer;
    font-family:"Noto Serif TC",serif;
    transition:background .15s;
  }
  .generate-btn:active{ background:var(--terracotta-deep); }

  .output-wrap{ margin-top:24px; }
  .output-wrap textarea{
    width:100%;
    min-height:300px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:8px;
    padding:16px;
    font-size:13px;
    line-height:1.7;
    color:var(--ink);
    font-family:monospace;
    resize:vertical;
  }
  .copy-btn{
    margin-top:10px;
    width:100%;
    background:var(--paper);
    border:1px solid var(--terracotta);
    color:var(--terracotta-deep);
    border-radius:8px;
    padding:13px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:background .15s;
  }
  .copy-btn.copied{ background:var(--terracotta); color:#fff; border-color:var(--terracotta); }
  .hidden{ display:none; }
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">第一輯 · 寫真旅拍</div>
    <h1>寫真旅拍風格咒語產生器</h1>

  <div class="note">

  <section>
    <button class="generate-btn" id="travelMoodPreset" style="margin-bottom:18px;background:linear-gradient(180deg,#FFF7EE 0%,#F6E1D0 100%);color:#A8593D;">隨機套用｜旅拍動感感覺</button>

  <!-- 01 構圖 -->

        <input type="radio" name="composition" value="B">

        <div class="desc">七分身,人物與環境平衡</div>
      </label>
      <label class="card selected" data-value="C">
        <input type="radio" name="composition" value="C" checked>
        <div class="name">C 旅拍大片</div>
        <div class="desc">全身入鏡,人物與環境並重</div>
      </label>
      <label class="card" data-value="D">
        <input type="radio" name="composition" value="D">
        <div class="name">D 電影海報</div>
        <div class="desc">半身特寫,強烈光影,戲劇感</div>

      <label class="card" data-value="E">

      <label class="card" data-value="F">

      </label>
    </div>
  </section>

function setupRadioCards(id){
  const c=document.getElementById(id);
  if(!c)return;
  c.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      c.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));
      card.classList.add('selected');
      card.querySelector('input').checked=true;
    });
  });
}
setupRadioCards('compositionCards');
setupRadioCards('styleCards');
setupRadioCards('ratioCards');
setupRadioCards('cameraCards');
setupRadioCards('motionCards');
setupRadioCards('mediaCards');

function setRadioCardValue(containerId, value){
  const container = document.getElementById(containerId);
  if(!container) return;
  container.querySelectorAll('.card').forEach(card=>{
    const input = card.querySelector('input');
    const selected = card.dataset.value === value;
    card.classList.toggle('selected', selected);
    if(input) input.checked = selected;
  });
}

function getRandomItem(values){
  return values[Math.floor(Math.random() * values.length)];
}

function getCardValues(containerId){
  return Array.from(document.querySelectorAll('#' + containerId + ' .card'))
    .map(card=>card.dataset.value)
    .filter(Boolean);
}

function applyTravelRandomSelection(){
  const compositionValue = getRandomItem(getCardValues('compositionCards'));
  const styleValue = getRandomItem(getCardValues('styleCards').filter(value => value !== 'vogue'));
  const ratioValue = getRandomItem(getCardValues('ratioCards'));
  const cameraValue = getRandomItem(getCardValues('cameraCards'));
  const motionValue = getRandomItem(getCardValues('motionCards'));
  const mediaValue = getRandomItem(getCardValues('mediaCards'));
  const themeValue = getRandomItem(Array.from(document.querySelectorAll('#themeChips .chip')).map(chip => chip.dataset.value));

  setRadioCardValue('compositionCards', compositionValue);
  setRadioCardValue('styleCards', styleValue);
  setRadioCardValue('ratioCards', ratioValue);
  setRadioCardValue('cameraCards', cameraValue);
  setRadioCardValue('motionCards', motionValue);
  setRadioCardValue('mediaCards', mediaValue);

  themeInputEl.value = themeValue;
  themeInputEl.dispatchEvent(new Event('input', { bubbles: true }));
  document.getElementById('generateBtn').click();
}


const TRAVEL_STYLE_PRESET_DEFAULTS = {
  japanese_clear: { camera: 'soft_focus', motion: 'breeze', media: 'cinematic_realistic' },
  retro_film_travel: { camera: 'handheld_doc', motion: 'flow', media: 'retro_film' },
  resort_hotel: { camera: 'tele_compression', motion: 'breeze', media: 'real_ad_photo' },
  natural_lifestyle: { camera: 'passerby_view', motion: 'flow', media: 'travel_magazine' },
  cinematic: { camera: 'backlit_silhouette', motion: 'dynamic', media: 'film_still' },
  vintage: { camera: 'handheld_doc', motion: 'breeze', media: 'retro_film' },
  luxury: { camera: 'cover', motion: 'breeze', media: 'real_ad_photo' },
  ethereal: { camera: 'soft_focus', motion: 'breeze', media: 'postcard_illustration' }
};

function applyTravelStyleDefaults(styleValue){
  const preset = TRAVEL_STYLE_PRESET_DEFAULTS[styleValue];
  if(!preset) return;
  if(preset.camera) setRadioCardValue('cameraCards', preset.camera);
  if(preset.motion) setRadioCardValue('motionCards', preset.motion);
  if(preset.media) setRadioCardValue('mediaCards', preset.media);
}

document.querySelectorAll('#styleCards .card').forEach(card=>{
  card.addEventListener('click',()=>{
    applyTravelStyleDefaults(card.dataset.value);
  });
});
const themeChips=document.querySelectorAll('#themeChips .chip');
const themeInputEl=document.getElementById('themeInput');
themeChips.forEach(chip=>{
  chip.addEventListener('click',()=>{
    themeChips.forEach(c=>c.classList.remove('selected'));
    chip.classList.add('selected');
    chip.querySelector('input').checked=true;
    themeInputEl.value=chip.dataset.value;
  });
});
themeInputEl.addEventListener('input',()=>{
  const m=Array.from(themeChips).find(c=>c.dataset.value===themeInputEl.value);
  themeChips.forEach(c=>c.classList.toggle('selected',c===m));
});

document.getElementById('generateBtn').addEventListener('click',()=>{
  const composition=document.querySelector('input[name="composition"]:checked').value;
  const styleKey=document.querySelector('input[name="style"]:checked').value;
  const ratioKey=document.querySelector('input[name="ratio"]:checked').value;
  const cameraKey=document.querySelector('input[name="camera"]:checked').value;
  const motionKey=document.querySelector('input[name="motion"]:checked').value;
  const mediaKey=document.querySelector('input[name="media"]:checked').value;
  const style=STYLES[styleKey];
  let theme=themeInputEl.value.trim();
  if(!theme)theme="(請填寫主題)";

  const styleBlock=`【風格模組｜主風格】\n\n${style.text}\n\n${STYLE_SCOPE_NOTE}`;
  const cameraBlock=CAMERA_ANGLES[cameraKey];
  const motionBlock=MOTION_LEVELS[motionKey];
  const mediaBlock=MEDIA_STYLES[mediaKey];
  const costumeBlock=`【服裝邏輯模組｜動態造型系統】\n\n根據主題「${theme}」自動設計服裝層次(Layer1~Layer7)\n服裝層數依主題自動增減,通常2~5層,特殊主題可擴展至7層\n優先真人旅拍感\n優先${style.label}的視覺語言\n服裝符合主題世界觀與材質質感\nPremium Fabric / Fine Embroidery / Rich Material Detail\n\n避免過度Cosplay化\n避免遊戲角色盔甲化\n避免動漫角色化`;
  const themeBlock=`【主題】\n\n${theme}`;
  const ratioBlock=`【輸出比例】\n\n${RATIOS[ratioKey]}`;

  const sections=[
    CORE.identity,
    CORE.skeleton,
    CORE.pose,
    CORE.photographer,
    ...(cameraBlock?[cameraBlock]:[]),
    ...(motionBlock?[motionBlock]:[]),
    COMPOSITION[composition],
    styleBlock,
    mediaBlock,
    themeBlock,
    costumeBlock,
    CORE.lighting,
    CORE.cleanframe,
    CORE.output,
    ratioBlock
  ];

  document.getElementById('outputText').value=sections.join('\n\n⸻\n\n');
  document.getElementById('outputWrap').classList.remove('hidden');
  document.getElementById('outputWrap').scrollIntoView({behavior:'smooth',block:'start'});
  const cb=document.getElementById('copyBtn');
  cb.textContent='複製咒語';
  cb.classList.remove('copied');
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  const text=document.getElementById('outputText').value;
  const btn=document.getElementById('copyBtn');
  function ok(){ btn.textContent='已複製!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='複製咒語'; btn.classList.remove('copied'); },1500); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok).catch(()=>{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }); }
  else{ document.getElementById('outputText').select(); document.execCommand('copy'); ok(); }
});

document.getElementById('travelMoodPreset').addEventListener('click',()=>{
  applyTravelRandomSelection();
});
</script>
