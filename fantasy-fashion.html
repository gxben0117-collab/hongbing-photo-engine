<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻想廣告咒語產生器｜藍寶寫真引擎</title>
<style>
  :root{
    --black:#09090B;
    --panel:#15131A;
    --panel-2:#1D1924;
    --line:#322D3C;
    --paper:#F7F4EF;
    --soft:#A7A0B5;
    --white:#FFFFFF;
    --gold:#C9A84C;
    --violet:#B889FF;
    --cyan:#72E4D5;
    --rose:#F18AA6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;
    background:var(--black);
    color:var(--paper);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:72px;
  }
  nav{
    position:fixed;
    top:0;left:0;right:0;
    height:54px;
    padding:0 24px;
    background:rgba(9,9,11,.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    color:var(--gold);
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    letter-spacing:.08em;
    text-decoration:none;
  }
  .nav-links{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .nav-link{
    color:var(--soft);
    text-decoration:none;
    font-size:12px;
    padding:6px 12px;
    border:1px solid transparent;
    border-radius:999px;
  }
  .nav-link:hover{color:var(--paper);border-color:var(--line);}
  .nav-link.active{color:#DCC8FF;border-color:rgba(184,137,255,.7);background:rgba(184,137,255,.1);}
  .wrap{
    width:min(920px,100%);
    margin:0 auto;
    padding:88px 20px 40px;
  }
  header{
    padding:28px 0 30px;
    border-bottom:1px solid var(--line);
    margin-bottom:28px;
  }
  .eyebrow{
    color:var(--violet);
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    margin-bottom:12px;
  }
  h1{
    font-family:"Noto Serif TC",serif;
    font-size:clamp(28px,6vw,42px);
    line-height:1.2;
    color:var(--white);
    margin-bottom:10px;
  }
  h1 span{color:#DCC8FF;}
  header p{color:var(--soft);font-size:14px;max-width:680px;}
  section{margin-bottom:26px;}
  .section-header{
    display:flex;
    align-items:baseline;
    gap:10px;
    border-bottom:1px solid var(--line);
    padding-bottom:10px;
    margin-bottom:12px;
  }
  .section-label{
    color:var(--violet);
    font-size:12px;
    font-weight:700;
    letter-spacing:.16em;
  }
  .section-title{font-size:16px;font-weight:800;color:var(--white);}
  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--panel);
    border-radius:8px;
    padding:12px 13px;
    cursor:pointer;
    transition:.15s;
    min-height:74px;
  }
  .card:hover{border-color:#554B67;background:var(--panel-2);}
  .card input{position:absolute;opacity:0;pointer-events:none;}
  .card .name{font-size:13px;font-weight:800;color:var(--paper);margin-bottom:3px;}
  .card .desc{font-size:11px;color:var(--soft);line-height:1.45;}
  .card.selected{border-color:var(--violet);background:#21172F;}
  .card.selected .name{color:#DCC8FF;}
  .pose-auto{margin-bottom:14px;}
  .pose-group{margin-bottom:18px;}
  .pose-group-label{
    color:#DCC8FF;
    font-size:12px;
    font-weight:800;
    letter-spacing:.12em;
    border-left:2px solid var(--violet);
    padding-left:8px;
    margin-bottom:8px;
  }
  .pose-group-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .pose-card{
    position:relative;
    display:block;
    border:1px solid var(--line);
    background:var(--panel);
    border-radius:8px;
    padding:12px 13px;
    cursor:pointer;
    transition:.15s;
    min-height:74px;
  }
  .pose-card:hover{border-color:#554B67;background:var(--panel-2);}
  .pose-card input{position:absolute;opacity:0;pointer-events:none;}
  .pose-name{font-size:13px;font-weight:800;color:var(--paper);margin-bottom:3px;}
  .pose-desc{font-size:11px;color:var(--soft);line-height:1.45;}
  .pose-card.selected{border-color:var(--violet);background:#21172F;}
  .pose-card.selected .pose-name{color:#DCC8FF;}
  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  label.field{
    display:flex;
    flex-direction:column;
    gap:6px;
    color:var(--soft);
    font-size:12px;
  }
  input[type="text"], textarea, select{
    width:100%;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--paper);
    border-radius:8px;
    padding:11px 12px;
    font:inherit;
    font-size:13px;
    outline:none;
  }
  textarea{min-height:90px;resize:vertical;}
  input:focus, textarea:focus, select:focus{border-color:var(--violet);}
  .full{grid-column:1/-1;}
  .actions{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:center;
    margin-top:18px;
  }
  button{
    border:0;
    border-radius:8px;
    padding:13px 18px;
    color:#120D18;
    background:linear-gradient(135deg,#DCC8FF,#72E4D5);
    font-weight:900;
    letter-spacing:.08em;
    cursor:pointer;
  }
  .copy-btn{
    background:transparent;
    color:#DCC8FF;
    border:1px solid rgba(184,137,255,.45);
  }
  .output{
    border:1px solid var(--line);
    background:#0F0E13;
    border-radius:8px;
    padding:16px;
    white-space:pre-wrap;
    min-height:240px;
    color:#EEE8F8;
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    font-size:13px;
    line-height:1.75;
  }
  .hint{color:var(--soft);font-size:12px;}
  @media (max-width:760px){
    nav{height:auto;min-height:54px;align-items:flex-start;padding:12px 16px;gap:10px;}
    .nav-links{gap:4px;}
    .nav-link{font-size:11px;padding:5px 8px;}
    .wrap{padding-top:104px;}
    .grid,.grid-3,.form-grid,.pose-group-grid{grid-template-columns:1fr 1fr;}
    .actions{grid-template-columns:1fr;}
  }
  @media (max-width:480px){
    .grid,.grid-3,.form-grid,.pose-group-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">藍寶寫真引擎</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="travel.html">寫真旅拍</a>
    <a class="nav-link" href="magazine.html">雜誌棚拍</a>
    <a class="nav-link" href="doll.html">公仔系列</a>
    <a class="nav-link active" href="fantasy-fashion.html">幻想廣告</a>
    <a class="nav-link" href="store-ad.html">店家廣告</a>
  </div>
</nav>

<main class="wrap">
  <header>
    <div class="eyebrow">Fantasy Commercial Campaign</div>
    <h1>幻想廣告<span>咒語產生器</span></h1>
    <p>把液體、花瓣、水墨、珠寶、水晶、火焰、星河能量與立體紙雕轉成高級商業主視覺，適合做吸睛廣告大片、幻想高訂海報與藝術展覽級作品。</p>
  </header>

  <section>
    <div class="section-header">
      <div class="section-label">01</div>
      <div class="section-title">服裝 / 呈現形式</div>
    </div>
    <div class="grid grid-3" data-choice="garment">
      <label class="card selected"><input type="radio" name="garment" value="dress" checked><div class="name">高訂禮服</div><div class="desc">全身時裝廣告主視覺</div></label>
      <label class="card"><input type="radio" name="garment" value="splashDress"><div class="name">飛濺液體裙</div><div class="desc">動態爆發、裙擺成形</div></label>
      <label class="card"><input type="radio" name="garment" value="cape"><div class="name">披風肩飾</div><div class="desc">材質形成披風與肩部裝飾</div></label>
      <label class="card"><input type="radio" name="garment" value="jewelry"><div class="name">珠寶裝飾</div><div class="desc">材質轉為胸飾、頭飾與珠寶</div></label>
      <label class="card"><input type="radio" name="garment" value="editorial"><div class="name">半身封面</div><div class="desc">近景商業封面構圖</div></label>
      <label class="card"><input type="radio" name="garment" value="fullBody"><div class="name">全身走秀</div><div class="desc">長腿、動態姿態、完整衣身</div></label>
      <label class="card"><input type="radio" name="garment" value="paperKimono"><div class="name">紙雕華服</div><div class="desc">多層紙藝服飾與花紋</div></label>
      <label class="card"><input type="radio" name="garment" value="oiranPortrait"><div class="name">紙雕肖像</div><div class="desc">盤髮髮簪與藝術半身像</div></label>
      <label class="card"><input type="radio" name="garment" value="museumArtwork"><div class="name">博物館級作品</div><div class="desc">藝術展覽主視覺</div></label>
    </div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-label">02</div>
      <div class="section-title">主題材質 / 藝術系統</div>
    </div>
    <div class="grid" data-choice="material">
      <label class="card selected"><input type="radio" name="material" value="milkTea" checked><div class="name">奶茶牛奶</div><div class="desc">焦糖奶茶與牛奶對撞</div></label>
      <label class="card"><input type="radio" name="material" value="strawberry"><div class="name">草莓奶昔</div><div class="desc">粉紅奶昔與草莓果粒</div></label>
      <label class="card"><input type="radio" name="material" value="banana"><div class="name">香蕉牛奶</div><div class="desc">金黃香蕉與奶白液體</div></label>
      <label class="card"><input type="radio" name="material" value="rose"><div class="name">玫瑰花瓣</div><div class="desc">花瓣形成高訂洋裝</div></label>
      <label class="card"><input type="radio" name="material" value="inkGold"><div class="name">黑金水墨</div><div class="desc">水墨與金色顏料流動</div></label>
      <label class="card"><input type="radio" name="material" value="diamond"><div class="name">鑽石水晶</div><div class="desc">珠寶雕塑與晶體反光</div></label>
      <label class="card"><input type="radio" name="material" value="phoenix"><div class="name">鳳凰聖焰</div><div class="desc">火焰披風與金紅光粒</div></label>
      <label class="card"><input type="radio" name="material" value="galaxy"><div class="name">星河能量</div><div class="desc">宇宙星塵與流光禮服</div></label>
      <label class="card"><input type="radio" name="material" value="paperOiran"><div class="name">和風花魁紙雕</div><div class="desc">櫻花紙藝與日式花魁</div></label>
      <label class="card"><input type="radio" name="material" value="paperSculpture"><div class="name">立體紙雕藝術</div><div class="desc">多層紙雕與浮雕花藝</div></label>
    </div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-label">03</div>
      <div class="section-title">廣告風格</div>
    </div>
    <div class="grid grid-3" data-choice="style">
      <label class="card selected"><input type="radio" name="style" value="luxury" checked><div class="name">精品廣告</div><div class="desc">高級商業大片質感</div></label>
      <label class="card"><input type="radio" name="style" value="poster"><div class="name">海報主視覺</div><div class="desc">留字空間、活動主圖感</div></label>
      <label class="card"><input type="radio" name="style" value="editorial"><div class="name">時尚雜誌</div><div class="desc">Editorial fashion cover</div></label>
      <label class="card"><input type="radio" name="style" value="cinematic"><div class="name">電影奇幻</div><div class="desc">強光影、戲劇場景</div></label>
      <label class="card"><input type="radio" name="style" value="blackGold"><div class="name">黑金奢華</div><div class="desc">暗背景、金色高反差</div></label>
      <label class="card"><input type="radio" name="style" value="clean"><div class="name">乾淨高級</div><div class="desc">留白、精緻、品牌感</div></label>
    </div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-label">04</div>
      <div class="section-title">自訂細節</div>
    </div>
    <div class="form-grid">
      <label class="field">自訂材質 / 藝術系統
        <input id="customMaterial" type="text" placeholder="例如：藍寶石能量、盛唐金粉、紅酒玫瑰">
      </label>
      <label class="field">人物與構圖
        <select id="composition">
          <option value="full body shot, elegant dynamic fashion pose, long legs">全身動態時裝姿態</option>
          <option value="upper body fashion portrait, strong eye contact, poster composition">半身封面人像</option>
          <option value="standing in the center of a material splash, cinematic low angle">站在材質飛濺中央</option>
          <option value="runway pose, dramatic couture silhouette, premium campaign">走秀高訂姿態</option>
        </select>
      </label>
      <label class="field">特效強度
        <select id="intensity">
          <option value="balanced material effects, elegant and luxurious">平衡高級</option>
          <option value="massive explosive material splash, high speed frozen motion">強烈爆發</option>
          <option value="subtle floating particles, refined couture details">細緻精修</option>
        </select>
      </label>
      <label class="field">色彩補充
        <input id="colorNote" type="text" placeholder="例如：黑金、草莓粉、奶油白、深紅背景">
      </label>
      <label class="field full">額外要求
        <textarea id="extraNote" placeholder="例如：左側保留標題空間、不要文字、背景要像精品香水廣告"></textarea>
      </label>
    </div>
  </section>

  <section>
    <div class="section-header">
      <div class="section-label">05</div>
      <div class="section-title">姿態模組</div>
    </div>
    <div data-choice="pose">
      <div class="pose-auto">
        <label class="pose-card selected" data-value="auto" style="display:inline-block;min-width:170px;">
          <input type="radio" name="pose" value="auto" checked>
          <div class="pose-name">✦ 自動</div>
          <div class="pose-desc">交給AI判斷最佳姿態</div>
        </label>
      </div>

      <div class="pose-group">
        <div class="pose-group-label">站姿系</div>
        <div class="pose-group-grid">
          <label class="pose-card"><input type="radio" name="pose" value="contrapposto"><div class="pose-name">S曲線站姿</div><div class="pose-desc">重心單腳,肩骨盆反向</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="hip"><div class="pose-name">手插腰站姿</div><div class="pose-desc">自信氣場,修長身形</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="lean"><div class="pose-name">倚牆站姿</div><div class="pose-desc">有張力的側身倚靠</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="turn"><div class="pose-name">回眸走姿</div><div class="pose-desc">轉身凝視,故事感強</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="back_turn"><div class="pose-name">背對回首</div><div class="pose-desc">完全背對+緩緩回頭,神秘感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="door_frame"><div class="pose-name">單手扶門框</div><div class="pose-desc">倚著門框側身,生活感張力</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="cape_wind"><div class="pose-name">披風揚起站姿</div><div class="pose-desc">衣擺被風吹起,戲劇感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="step_up"><div class="pose-name">踏台階站姿</div><div class="pose-desc">單腳踩高台,俯視感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="runway_stride"><div class="pose-name">伸展走秀步</div><div class="pose-desc">一腳向前跨出,腿線修長</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="crossed_leg_stand"><div class="pose-name">交叉腿站姿</div><div class="pose-desc">雙腿交叉,窄身高級感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="shoulder_wall"><div class="pose-name">肩靠牆面</div><div class="pose-desc">單肩貼牆,冷感側身</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="coat_hold"><div class="pose-name">抓外套領口</div><div class="pose-desc">雙手抓領口,高訂氣場</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="one_leg_forward"><div class="pose-name">單腿前伸站姿</div><div class="pose-desc">一腿前伸,腳尖拉長</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="profile_long_line"><div class="pose-name">側身長線條</div><div class="pose-desc">側身站立,頸肩腰線清楚</div></label>
        </div>
      </div>

      <div class="pose-group">
        <div class="pose-group-label">坐姿 / 地面系</div>
        <div class="pose-group-grid">
          <label class="pose-card"><input type="radio" name="pose" value="guifei"><div class="pose-name">貴妃倚坐</div><div class="pose-desc">單腿伸展,慵懶女王感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="chin_rest"><div class="pose-name">托腮坐姿</div><div class="pose-desc">單手托腮+腿交叉優雅感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="kneel"><div class="pose-name">單膝跪姿</div><div class="pose-desc">挺胸收腰,時尚大片感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="hands_ground"><div class="pose-name">雙手撐地跪姿</div><div class="pose-desc">前傾+雙手撐地+仰頭</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="lunge"><div class="pose-name">低重心弓步</div><div class="pose-desc">戰鬥起手式,爆發力</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="side_lie"><div class="pose-name">側躺延伸</div><div class="pose-desc">側躺+單手托頭+腿部延伸</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="hug_knees"><div class="pose-name">抱膝坐姿</div><div class="pose-desc">雙手環抱膝蓋,情緒感強</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="prone_chin"><div class="pose-name">趴地仰頭</div><div class="pose-desc">俯臥+手撐下巴+仰頭,慵懶感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="chair_edge"><div class="pose-name">椅緣前坐</div><div class="pose-desc">坐椅緣,上身前傾,封面張力</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="floor_side_sit"><div class="pose-name">側坐地面</div><div class="pose-desc">雙腿側放,腰背挺直</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="kneeling_sit"><div class="pose-name">跪坐端正</div><div class="pose-desc">跪坐但身形挺拔,安靜高級</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="stairs_sit"><div class="pose-name">坐台階</div><div class="pose-desc">坐在階梯上,腿部有層次</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="cross_leg_floor"><div class="pose-name">盤腿地坐</div><div class="pose-desc">盤腿坐姿,安定故事感</div></label>
          <label class="pose-card"><input type="radio" name="pose" value="sofa_recline"><div class="pose-name">沙發斜倚</div><div class="pose-desc">身體斜靠,慵懶精品感</div></label>
        </div>
      </div>

      <div class="pose-group">
        <div class="pose-group-label">手勢 / 動作系</div>
        <div class="pose-group-grid">
          <label class="pose-card"><input type="radio" name="pose" value="vogue_hands"><div class="pose-name">Vogue手勢</div><div class="pose-desc">雙手框住臉,Ballroom感</div></label>

const framingData = {
  fullBody: 'full body shot, entire outfit visible, head to toe composition',
  threeQuarter: 'three-quarter body shot, large model presence, dress and material details visible',
  halfBody: 'half body advertising portrait, face, shoulders and upper couture details emphasized',
  closeUp: 'close-up fashion beauty portrait, strong facial identity, material wrapping near face and shoulders',

  lowAngle: 'low angle full body shot, elongated legs, powerful luxury fashion proportions'
};

const cameraData = {
  studio: 'professional studio camera language, controlled commercial lighting, crisp premium focus',
  lowFashion: 'low angle fashion photography, dramatic perspective, high fashion long-leg proportions',
  highSpeed: 'high speed splash photography, frozen motion, sharp liquid particles and material droplets',
  editorial: 'magazine cover camera language, strong eye contact, refined editorial framing',
  cinematic: 'cinematic camera language, dramatic depth, atmospheric lighting and premium visual storytelling',
  product: 'luxury product advertising camera language, material treated like the hero product, clean commercial clarity'
};

const ratioData = {
  vertical916: 'aspect ratio 9:16, vertical social media cover composition',
  vertical45: 'aspect ratio 4:5, vertical social media feed poster composition',
  square: 'aspect ratio 1:1, square commercial campaign image',
  poster23: 'aspect ratio 2:3, vertical luxury poster composition'
};

function selected(name){
  return document.querySelector(`input[name="${name}"]:checked`).value;
}

function refreshCards(){
  document.querySelectorAll('[data-choice]').forEach(group => {
    group.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('selected', card.querySelector('input').checked);
    });
  });
}

function generate(){
  const materialKey = selected('material');
  const material = materialData[materialKey];
  const customMaterial = document.getElementById('customMaterial').value.trim();
  const materialText = customMaterial
    ? `${customMaterial}, ${material.prompt}`
    : material.prompt;
  const colorNote = document.getElementById('colorNote').value.trim();
  const extraNote = document.getElementById('extraNote').value.trim();
  const composition = document.getElementById('composition').value;
  const intensity = document.getElementById('intensity').value;
  const poseText = poseData[selected('pose')];
  const prompt = [
    'Ultra beautiful adult woman, fashion editorial model, identity-preserving portrait based on reference photo if provided,',
    composition + ',',
    'appearance form: ' + garmentData[selected('garment')] + ',',
    'theme material and art system: ' + materialText + ',',
    'use the selected material system to form the clothing, ornaments, background, surface details and advertising visual language,',
    intensity + ',',
    'dynamic material particles or layered craft elements surrounding the body, elegant body curve, premium skin rendering, sophisticated hair and makeup,',
    styleData[selected('style')] + ',',
    poseText ? poseText + ',' : '',
    framingData[selected('framing')] + ',',
    cameraData[selected('camera')] + ',',
    ratioData[selected('ratio')] + ',',
    'professional studio lighting, cinematic composition, sharp focus, hyper realistic, 8K ultra detailed, award winning advertising,',
    'color palette: ' + (colorNote || material.palette) + ',',
    extraNote ? 'extra direction: ' + extraNote + ',' : '',
    'no random text, no watermark, no logo artifacts, no extra fingers, no deformed body, no distorted face'
  ].filter(Boolean).join('\n');

  document.getElementById('output').textContent = prompt;
}

document.querySelectorAll('input[type="radio"]').forEach(input => {
  input.addEventListener('change', () => {
    refreshCards();
    generate();
  });
});
document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = document.getElementById('output').textContent;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '已複製';
  setTimeout(() => btn.textContent = '複製咒語', 1200);
});
['customMaterial','composition','intensity','colorNote','extraNote'].forEach(id => {
  document.getElementById(id).addEventListener('input', generate);
  document.getElementById(id).addEventListener('change', generate);
});
refreshCards();
generate();
</script>
