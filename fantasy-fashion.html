  .card{
    position:relative;
    border:1px solid var(--line);

    border-radius:8px;

    cursor:pointer;
    transition:.15s;

    font-size:13px;
    outline:none;

  .actions{
    display:grid;

    align-items:center;
    margin-top:18px;

    letter-spacing:.08em;

  }
  .copy-btn{

    border:1px solid rgba(184,137,255,.45);

    font-size:13px;
    line-height:1.75;
  }
  .hint{color:var(--soft);font-size:12px;}
  @media (max-width:760px){
    nav{height:auto;min-height:54px;align-items:flex-start;padding:12px 16px;gap:10px;}

    .nav-link{font-size:11px;padding:5px 8px;}
    .wrap{padding-top:104px;}
    .grid,.grid-3,.form-grid{grid-template-columns:1fr 1fr;}
    .actions{grid-template-columns:1fr;}
  }
  @media (max-width:480px){
    .grid,.grid-3,.form-grid{grid-template-columns:1fr;}
  }
</style>

      <label class="card"><input type="radio" name="garment" value="editorial"><div class="name">半身封面</div><div class="desc">近景商業封面構圖</div></label>

const ratioData = {
  vertical916: 'aspect ratio 9:16, vertical social media cover composition',
  vertical45: 'aspect ratio 4:5, vertical social media feed poster composition',
  square: 'aspect ratio 1:1, square commercial campaign image',
  poster23: 'aspect ratio 2:3, vertical luxury poster composition'
};

function selected(name){
  return document.querySelector(`input[name="${name}"]:checked`).value;
}

function refreshCards(){
  document.querySelectorAll('[data-choice]').forEach(group => {
    group.querySelectorAll('.card').forEach(card => {
      card.classList.toggle('selected', card.querySelector('input').checked);
    });
  });
}

function generate(){
  const materialKey = selected('material');
  const material = materialData[materialKey];
  const customMaterial = document.getElementById('customMaterial').value.trim();
  const materialText = customMaterial
    ? `${customMaterial}, ${material.prompt}`
    : material.prompt;
  const colorNote = document.getElementById('colorNote').value.trim();
  const extraNote = document.getElementById('extraNote').value.trim();
  const composition = document.getElementById('composition').value;
  const intensity = document.getElementById('intensity').value;
  const prompt = [
    'Ultra beautiful adult woman, fashion editorial model, identity-preserving portrait based on reference photo if provided,',
    composition + ',',
    garmentData[selected('garment')] + ',',
    'material fashion layer, dress and decorative elements made of ' + materialText + ',',
    intensity + ',',
    'dynamic material particles surrounding the body, elegant body curve, premium skin rendering, sophisticated hair and makeup,',
    styleData[selected('style')] + ',',
    poseData[selected('pose')] + ',',
    framingData[selected('framing')] + ',',
    cameraData[selected('camera')] + ',',
    ratioData[selected('ratio')] + ',',
    'professional studio lighting, cinematic composition, sharp focus, hyper realistic, 8K ultra detailed, award winning advertising,',
    'color palette: ' + (colorNote || material.palette) + ',',
    extraNote ? 'extra direction: ' + extraNote + ',' : '',
    'no random text, no watermark, no logo artifacts, no extra fingers, no deformed body, no distorted face'
  ].filter(Boolean).join('\n');

  document.getElementById('output').textContent = prompt;
}

document.querySelectorAll('input[type="radio"]').forEach(input => {
  input.addEventListener('change', () => {
    refreshCards();
    generate();
  });
});
document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = document.getElementById('output').textContent;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '已複製';
  setTimeout(() => btn.textContent = '複製咒語', 1200);
});
['customMaterial','composition','intensity','colorNote','extraNote'].forEach(id => {
  document.getElementById(id).addEventListener('input', generate);
  document.getElementById(id).addEventListener('change', generate);
});
refreshCards();
generate();
</script>
</body>
</html>
