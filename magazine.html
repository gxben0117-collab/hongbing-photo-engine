<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雜誌棚拍風格咒語產生器｜藍寶 Editorial Engine</title>
<style>
  :root{
    --black:#0A0A0A;
    --charcoal:#1A1A1A;
    --dark:#222222;
    --mid:#555555;
    --soft:#999999;
    --line:#2E2E2E;
    --paper:#F7F4EF;
    --cream:#FFFCF8;
    --gold:#C9A84C;
    --gold-soft:#E8D5A3;
    --white:#FFFFFF;
    --selected-bg:#1E1A14;
    --selected-border:#C9A84C;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--black);
    color:var(--paper);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }
  .wrap{
    max-width:660px;
    margin:0 auto;
    padding:70px 20px 40px;
  }

  /* ── NAV ── */
  nav{
    position:fixed;
    top:0;left:0;right:0;
    background:rgba(10,10,10,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    z-index:100;
    padding:0 24px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .nav-logo{
    font-family:"Noto Serif TC",serif;
    font-size:14px;
    font-weight:700;
    color:var(--gold);
    letter-spacing:0.08em;
    text-decoration:none;
  }
  .nav-links{ display:flex; gap:6px; }
  .nav-link{
    font-size:12px;
    color:var(--soft);
    text-decoration:none;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .15s;
  }
  .nav-link:hover{ color:var(--paper); border-color:var(--line); }
  .nav-link.active{ color:var(--gold); border-color:var(--gold); background:rgba(201,168,76,0.08); }

  /* ── HEADER ── */
  header{
    padding:48px 0 36px;
    border-bottom:1px solid var(--line);
    margin-bottom:36px;
  }
  .header-eyebrow{
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  header h1{
    font-family:"Noto Serif TC",serif;
    font-size:32px;
    font-weight:900;
    letter-spacing:0.02em;
    line-height:1.2;
    color:var(--white);
    margin-bottom:10px;
  }
  header h1 span{
    color:var(--gold);
  }
  header p{
    font-size:13px;
    color:var(--soft);
  }

  /* ── SECTION ── */
  section{
    margin-bottom:36px;
  }
  .section-header{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid #3E3E3E;
  }
  .section-label{
    font-family:"Noto Serif TC",serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .section-title{
    font-size:16px;
    font-weight:700;
    color:var(--white);
  }
  .section-sub{
    font-size:12px;
    color:#BBBBBB;
    margin-left:auto;
  }

  /* ── CARDS ── */
  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .cards-4{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .card{
    position:relative;
    border:1px solid var(--line);
    background:var(--charcoal);
    border-radius:8px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }
  .card .name{
    font-weight:700;
    font-size:13px;
    color:var(--paper);
    margin-bottom:3px;
  }
  .card .desc{
    font-size:11px;
    color:var(--soft);
    line-height:1.4;
  }
  .card.selected{
    border-color:var(--gold);
    background:var(--selected-bg);
  }
  .card.selected .name{
    color:var(--gold);
  }

  /* ── POSE GROUP ── */
  .pose-auto{
    margin-bottom:14px;
  }
  .pose-auto .pose-card{
    max-width:160px;
  }
  .pose-group{
    margin-bottom:16px;
  }
  .pose-group-label{
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--soft);
    margin-bottom:8px;
    padding-left:2px;
  }
  .pose-group-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .pose-group-grid-3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }

  /* ── CHIPS ── */
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    position:relative;
    border:1px solid var(--line);
    background:var(--charcoal);
    border-radius:999px;
    padding:7px 16px;
    font-size:13px;
    color:var(--paper);
    cursor:pointer;
    transition:border-color .15s, background .15s, color .15s;
  }
  .chip input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }
  .chip.selected{
    border-color:var(--gold);
    background:var(--selected-bg);
    color:var(--gold);
    font-weight:700;
  }

  /* ── NOTE ── */
  .note{
    background:var(--charcoal);
    border:1px solid var(--line);
    border-left:3px solid var(--gold);
    border-radius:6px;
    padding:12px 14px;
    font-size:12px;
    color:var(--soft);
    margin-bottom:32px;
  }

  /* ── POSE GRID ── */
  .pose-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:8px;
  }
  .pose-card{
    position:relative;
    border:1px solid var(--line);
    background:var(--charcoal);
    border-radius:8px;
    padding:12px 14px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .pose-card input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }
  .pose-card .pose-name{
    font-weight:700;
    font-size:13px;
    color:var(--paper);
    margin-bottom:3px;
  }
  .pose-card .pose-desc{
    font-size:11px;
    color:var(--soft);
    line-height:1.4;
  }
  .pose-card.selected{
    border-color:var(--gold);
    background:var(--selected-bg);
  }
  .pose-card.selected .pose-name{
    color:var(--gold);
  }
  .pose-card.risky{
    border-color:#5a2a2a;
  }
  .pose-card.risky .pose-name{
    color:#E08080;
  }
  .pose-card.risky .pose-desc{
    color:#a06060;
  }
  .pose-card.risky.selected{
    border-color:#E08080;
    background:#1E1010;
  }
  .pose-card.risky.selected .pose-name{
    color:#E08080;
  }
  .pose-warning{
    display:none;
    margin-top:10px;
    background:#1E1010;
    border:1px solid #5a2a2a;
    border-left:3px solid #E08080;
    border-radius:6px;
    padding:10px 14px;
    font-size:12px;
    color:#E08080;
    line-height:1.6;
  }
  .pose-warning.visible{
    display:block;
  }

  /* ── INPUTS ── */
  .text-input{
    width:100%;
    background:var(--charcoal);
    border:1px solid var(--line);
    border-radius:8px;
    padding:13px 14px;
    font-size:14px;
    color:var(--paper);
    font-family:inherit;
    margin-top:10px;
  }
  .text-input::placeholder{ color:var(--mid); }
  .text-input:focus{
    outline:none;
    border-color:var(--gold);
  }

  /* ── GENERATE BUTTON ── */
  .generate-btn{
    width:100%;
    background:var(--gold);
    color:var(--black);
    border:none;
    border-radius:8px;
    padding:18px;
    font-size:15px;
    font-weight:900;
    letter-spacing:0.08em;
    cursor:pointer;
    font-family:"Noto Serif TC",serif;
    transition:opacity .15s;
  }
  .generate-btn:active{ opacity:0.85; }

  /* ── OUTPUT ── */
  .output-wrap{
    margin-top:28px;
  }
  .output-wrap textarea{
    width:100%;
    min-height:300px;
    background:var(--charcoal);
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px;
    font-size:12px;
    line-height:1.8;
    color:var(--paper);
    font-family:monospace;
    resize:vertical;
  }
  .copy-btn{
    margin-top:8px;
    width:100%;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    border-radius:8px;
    padding:13px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.05em;
    transition:background .15s, color .15s;
  }
  .copy-btn.copied{
    background:var(--gold);
    color:var(--black);
  }
  .hidden{ display:none; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">藍寶 Editorial Engine</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="travel.html">寫真旅拍</a>
    <a class="nav-link active" href="magazine.html">雜誌棚拍</a>
  </div>
</nav>

<div class="wrap">

  <header>
    <div class="header-eyebrow">Vol.2 · Studio Editorial</div>
    <h1>雜誌<span>棚拍風格</span>咒語產生器</h1>
    <p>封面人像咒語產生器｜身份鎖定 × 封面氣場</p>
  </header>

  <div class="note">
    💡 使用時請附上人物參考照片——身份鎖定系統需要照片才能生效。
  </div>

  <!-- 01 封面風格 -->
  <section>
    <div class="section-header">
      <span class="section-label">01</span>
      <span class="section-title">封面風格</span>
      <span class="section-sub">單選</span>
    </div>
    <div class="cards" id="styleCards">
      <label class="card selected" data-value="vogue">
        <input type="radio" name="style" value="vogue" checked>
        <div class="name">Vogue</div>
        <div class="desc">極致精緻,強烈造型感</div>
      </label>
      <label class="card" data-value="bazaar">
        <input type="radio" name="style" value="bazaar">
        <div class="name">Harper's Bazaar</div>
        <div class="desc">藝術感,戲劇光影</div>
      </label>
      <label class="card" data-value="elle">
        <input type="radio" name="style" value="elle">
        <div class="name">ELLE</div>
        <div class="desc">時尚清新,現代都會</div>
      </label>
      <label class="card" data-value="bazaar_cn">
        <input type="radio" name="style" value="bazaar_cn">
        <div class="name">時尚芭莎</div>
        <div class="desc">東方奢華,高級感</div>
      </label>
      <label class="card" data-value="cosmopolitan">
        <input type="radio" name="style" value="cosmopolitan">
        <div class="name">Cosmopolitan</div>
        <div class="desc">活力自信,大膽色彩</div>
      </label>
      <label class="card" data-value="natgeo">
        <input type="radio" name="style" value="natgeo">
        <div class="name">National Geographic</div>
        <div class="desc">故事感,自然光影</div>
      </label>
      <label class="card" data-value="w_magazine">
        <input type="radio" name="style" value="w_magazine">
        <div class="name">W Magazine</div>
        <div class="desc">前衛藝術,大膽實驗構圖</div>
      </label>
      <label class="card" data-value="another">
        <input type="radio" name="style" value="another">
        <div class="name">AnOther Magazine</div>
        <div class="desc">獨立時尚,黑白高對比</div>
      </label>
      <label class="card" data-value="lofficiel">
        <input type="radio" name="style" value="lofficiel">
        <div class="name">L'Officiel</div>
        <div class="desc">法式優雅,古典柔和高貴</div>
      </label>
      <label class="card" data-value="marie_claire">
        <input type="radio" name="style" value="marie_claire">
        <div class="name">嘉人 Marie Claire</div>
        <div class="desc">東方現代,清新都會女性</div>
      </label>
    </div>
  </section>

  <!-- 02 背景設定 -->
  <section>
    <div class="section-header">
      <span class="section-label">02</span>
      <span class="section-title">背景設定</span>
      <span class="section-sub">單選</span>
    </div>
    <div class="cards" id="bgCards">
      <label class="card selected" data-value="studio">
        <input type="radio" name="bg" value="studio" checked>
        <div class="name">純色棚拍</div>
        <div class="desc">乾淨背景,人物為絕對主體</div>
      </label>
      <label class="card" data-value="gradient">
        <input type="radio" name="bg" value="gradient">
        <div class="name">漸層背景</div>
        <div class="desc">色彩過渡,時尚感強</div>
      </label>
      <label class="card" data-value="scene">
        <input type="radio" name="bg" value="scene">
        <div class="name">場景融合</div>
        <div class="desc">背景虛化,環境氛圍感</div>
      </label>
      <label class="card" data-value="abstract">
        <input type="radio" name="bg" value="abstract">
        <div class="name">抽象藝術</div>
        <div class="desc">幾何/紋理/藝術感背景</div>
      </label>
    </div>
  </section>

  <!-- 03 姿態模組 -->
  <section>
    <div class="section-header">
      <span class="section-label">03</span>
      <span class="section-title">姿態模組</span>
      <span class="section-sub">單選,可選自動</span>
    </div>

    <!-- 自動 -->
    <div class="pose-auto">
      <label class="pose-card selected" data-value="auto" style="display:inline-block;min-width:160px;">
        <input type="radio" name="pose" value="auto" checked>
        <div class="pose-name">✦ 自動</div>
        <div class="pose-desc">交給AI判斷最佳姿態</div>
      </label>
    </div>

    <!-- 站姿系 -->
    <div class="pose-group">
      <div class="pose-group-label">站姿系</div>
      <div class="pose-group-grid" id="poseCards">
        <label class="pose-card" data-value="contrapposto">
          <input type="radio" name="pose" value="contrapposto">
          <div class="pose-name">S曲線站姿</div>
          <div class="pose-desc">重心單腳,肩骨盆反向</div>
        </label>
        <label class="pose-card" data-value="hip">
          <input type="radio" name="pose" value="hip">
          <div class="pose-name">手插腰站姿</div>
          <div class="pose-desc">自信氣場,修長身形</div>
        </label>
        <label class="pose-card" data-value="lean">
          <input type="radio" name="pose" value="lean">
          <div class="pose-name">倚牆站姿</div>
          <div class="pose-desc">有張力的側身倚靠</div>
        </label>
        <label class="pose-card" data-value="turn">
          <input type="radio" name="pose" value="turn">
          <div class="pose-name">回眸走姿</div>
          <div class="pose-desc">轉身凝視,故事感強</div>
        </label>
        <label class="pose-card" data-value="back_turn">
          <input type="radio" name="pose" value="back_turn">
          <div class="pose-name">背對回首</div>
          <div class="pose-desc">完全背對+緩緩回頭,神秘感</div>
        </label>
      </div>
    </div>

    <!-- 坐姿/地面系 -->
    <div class="pose-group">
      <div class="pose-group-label">坐姿 / 地面系</div>
      <div class="pose-group-grid">
        <label class="pose-card" data-value="guifei">
          <input type="radio" name="pose" value="guifei">
          <div class="pose-name">貴妃倚坐</div>
          <div class="pose-desc">單腿伸展,慵懶女王感</div>
        </label>
        <label class="pose-card" data-value="chin_rest">
          <input type="radio" name="pose" value="chin_rest">
          <div class="pose-name">托腮坐姿</div>
          <div class="pose-desc">單手托腮+腿交叉優雅感</div>
        </label>
        <label class="pose-card" data-value="kneel">
          <input type="radio" name="pose" value="kneel">
          <div class="pose-name">單膝跪姿</div>
          <div class="pose-desc">挺胸收腰,時尚大片感</div>
        </label>
        <label class="pose-card" data-value="hands_ground">
          <input type="radio" name="pose" value="hands_ground">
          <div class="pose-name">雙手撐地跪姿</div>
          <div class="pose-desc">前傾+雙手撐地+仰頭</div>
        </label>
        <label class="pose-card" data-value="lunge">
          <input type="radio" name="pose" value="lunge">
          <div class="pose-name">低重心弓步</div>
          <div class="pose-desc">戰鬥起手式,爆發力</div>
        </label>
        <label class="pose-card" data-value="side_lie">
          <input type="radio" name="pose" value="side_lie">
          <div class="pose-name">側躺延伸</div>
          <div class="pose-desc">側躺+單手托頭+腿部延伸</div>
        </label>
      </div>
    </div>

    <!-- 手勢/動作系 -->
    <div class="pose-group">
      <div class="pose-group-label">手勢 / 動作系</div>
      <div class="pose-group-grid">
        <label class="pose-card" data-value="vogue_hands">
          <input type="radio" name="pose" value="vogue_hands">
          <div class="pose-name">Vogue手勢</div>
          <div class="pose-desc">雙手框住臉,Ballroom感</div>
        </label>
        <label class="pose-card" data-value="arms_wide">
          <input type="radio" name="pose" value="arms_wide">
          <div class="pose-name">展翅手臂</div>
          <div class="pose-desc">雙臂大幅向兩側延伸</div>
        </label>
        <label class="pose-card" data-value="water_sleeve">
          <input type="radio" name="pose" value="water_sleeve">
          <div class="pose-name">水袖揚起</div>
          <div class="pose-desc">東方戲劇感,水袖飄動</div>
        </label>
        <label class="pose-card" data-value="fan_cover">
          <input type="radio" name="pose" value="fan_cover">
          <div class="pose-name">持扇遮面</div>
          <div class="pose-desc">單手持扇半遮臉+側身</div>
        </label>
        <label class="pose-card" data-value="tiptoe">
          <input type="radio" name="pose" value="tiptoe">
          <div class="pose-name">踮腳仰手</div>
          <div class="pose-desc">踮腳尖+雙手向上延伸</div>
        </label>
      </div>
    </div>

    <!-- 高風險系 -->
    <div class="pose-group">
      <div class="pose-group-label" style="color:#E08080;">⚠️ 高風險系 — AI易出現肢體扭曲,建議多生成幾次挑選</div>
      <div class="pose-group-grid-3">
        <label class="pose-card risky" data-value="jojo_twist" data-risky="true">
          <input type="radio" name="pose" value="jojo_twist">
          <div class="pose-name">⚠️ JoJo扭腰</div>
          <div class="pose-desc">誇張扭腰側身+手指指向鏡頭</div>
        </label>
        <label class="pose-card risky" data-value="jojo_cross" data-risky="true">
          <input type="radio" name="pose" value="jojo_cross">
          <div class="pose-name">⚠️ JoJo交叉</div>
          <div class="pose-desc">雙手交叉胸前+仰頭俯視</div>
        </label>
        <label class="pose-card risky" data-value="dip" data-risky="true">
          <input type="radio" name="pose" value="dip">
          <div class="pose-name">⚠️ Dip後仰</div>
          <div class="pose-desc">大幅後仰接近地面,Ballroom</div>
        </label>
      </div>
    </div>

  </section>

  <!-- 04 鏡頭氣場 -->
  <section>
    <div class="section-header">
      <span class="section-label">04</span>
      <span class="section-title">鏡頭氣場</span>
      <span class="section-sub">單選</span>
    </div>
    <div class="cards" id="cameraCards">
      <label class="card selected" data-value="neutral">
        <input type="radio" name="camera" value="neutral" checked>
        <div class="name">自然平視</div>
        <div class="desc">標準封面視角(預設)</div>
      </label>
      <label class="card" data-value="low">
        <input type="radio" name="camera" value="low">
        <div class="name">低角度仰拍</div>
        <div class="desc">Hero Shot / 鏡頭低於腰部</div>
      </label>
      <label class="card" data-value="high">
        <input type="radio" name="camera" value="high">

  themeChips.forEach(chip=>{

    if(recommended.length === 0){
      chip.style.borderColor = '';
      chip.style.opacity = '1';

      chip.style.borderColor = 'var(--gold)';
      chip.style.opacity = '1';
    } else {
      chip.style.borderColor = '';
      chip.style.opacity = '0.45';

  ];

  document.getElementById('outputText').value = sections.join('\n\n⸻\n\n');
  document.getElementById('outputWrap').classList.remove('hidden');
  document.getElementById('outputWrap').scrollIntoView({behavior:'smooth', block:'start'});

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '複製咒語';
  copyBtn.classList.remove('copied');
});

// ====== 複製 ======
document.getElementById('copyBtn').addEventListener('click',()=>{
  const text = document.getElementById('outputText').value;
  const btn = document.getElementById('copyBtn');
  function showCopied(){
    btn.textContent='已複製!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='複製咒語';btn.classList.remove('copied');},1500);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showCopied).catch(()=>{
      document.getElementById('outputText').select();
      document.execCommand('copy');showCopied();
    });
  } else {
    document.getElementById('outputText').select();
    document.execCommand('copy');showCopied();
  }
});
</script>
</body>
</html>
